<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://cdnjs.cloudflare.com;
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com;
  font-src 'self' https://fonts.gstatic.com;
  img-src 'self' data: blob: https:;
  connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com;
  frame-src 'self' https://*.firebaseapp.com;
">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aeronaves Disponíveis | Plane Aviation</title>
<link rel="stylesheet" href="styles.css">
<script src="js/i18n.js" defer></script>
<script src="js/site.js" defer></script>
</head>
<body class="bg-radial-dark">
<div id="site-header"></div>
<main>
  <section class="ac-hero">
    <div class="container">
      <span class="eyebrow dark" data-i18n="ac_eyebrow">Estoque</span>
      <h1 class="h-display" style="color: #fff; margin-bottom: 1.25rem;" data-i18n="ac_title">Aeronaves Disponíveis</h1>
      <p class="text-body" style="font-style: italic; color: rgba(255,255,255,0.5);" data-i18n="ac_sub">Unidades certificadas, inspecionadas e prontas para entrega.</p>
    </div>
  </section>

  <section style="padding-bottom:5rem">
    <div class="container">
      
      <div class="filter-wrapper" id="filtersBar" style="display:none">
        
        <div class="filter-header">
          <button id="filterToggleBtn" class="filter-toggle-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em;"><line x1="21" x2="14" y1="4" y2="4"/><line x1="10" x2="3" y1="4" y2="4"/><line x1="21" x2="12" y1="12" y2="12"/><line x1="8" x2="3" y1="12" y2="12"/><line x1="21" x2="16" y1="20" y2="20"/><line x1="12" x2="3" y1="20" y2="20"/><line x1="14" x2="14" y1="2" y2="6"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="16" x2="16" y1="18" y2="22"/></svg>
            <span data-i18n="ac_filters">Filtros</span>
            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
          </button>
          
          <div class="filter-count" id="count"></div>
        </div>
        
        <div class="filter-panel" id="filterPanel">
          <div class="filter-panel-inner">
            <div class="filter-grid">
              
              <div class="form-group" style="margin-bottom: 0;">
                <label data-i18n="ac_model">Modelo:</label>
                <select id="fModelo"></select>
              </div>
              
              <div class="form-group" style="margin-bottom: 0;">
                <label data-i18n="ac_condition">Condição:</label>
                <select id="fCondicao"></select>
              </div>
              
              <div class="form-group" style="margin-bottom: 0;">
                <label data-i18n="ac_year">Ano:</label>
                <select id="fAno"></select>
              </div>

            </div>
          </div>
        </div>
      </div>

      <div class="ac-grid" id="grid"></div>
    </div>
  </section>
</main>
<div id="site-footer"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
const DIAGONAL_ARROW = '<svg class="icon-arrow-diag" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M7 7h10v10"/></svg>';

let allListings = [];
const elModelo  = document.getElementById("fModelo");
const elCond    = document.getElementById("fCondicao");
const elAno     = document.getElementById("fAno");
const elGrid    = document.getElementById("grid");
const elCount   = document.getElementById("count");
const filtersBar= document.getElementById("filtersBar");

// Gatilhos de Animação do Novo Painel de Filtros
const filterBtn = document.getElementById("filterToggleBtn");
const filterPanel = document.getElementById("filterPanel");

if (filterBtn && filterPanel) {
  filterBtn.addEventListener("click", () => {
    filterBtn.classList.toggle("open");
    filterPanel.classList.toggle("open");
  });
}

function t(k){ return window.PA_I18N ? PA_I18N.t(k) : k; }
function getLang(){ return window.PA_I18N ? PA_I18N.getLang() : "pt"; }

function fill(el, opts){
  el.innerHTML = opts.map(o => `<option>${o}</option>`).join("");
}

function getLocalizedCondition(item){
  const lang = getLang();
  if(lang === "pt") return item.condition || "";
  return item.translations?.[lang]?.condition || item.condition || "";
}

function formatPrice(item){
  if(item.sobConsulta || !item.priceNum) return t("ac_consult");
  return item.currency === "BRL"
    ? "R$" + Number(item.priceNum).toLocaleString("pt-BR")
    : "USD " + Number(item.priceNum).toLocaleString("en-US");
}

function hoursLabel(item){
  if(item.hoursNum == null) return "";
  return `${Number(item.hoursNum).toLocaleString("pt-BR")}h`;
}

function cardHTML(item){
  const cond = getLocalizedCondition(item);
  const price = formatPrice(item);
  const hours = hoursLabel(item);
  const meta = [item.year, hours].filter(Boolean).join(" · ");
  const media = (item.images && item.images[0])
    ? `<img src="${item.images[0]}" alt="${item.model}" loading="lazy">`
    : `<div class="ph-dark">[Foto]</div>`;
    
  const titleParts = item.model.match(/^(.*?)(\s[A-Z0-9+]+)?$/);
  const titleMain = titleParts ? titleParts[1] : item.model;
  const titleSub  = titleParts && titleParts[2] ? titleParts[2] : "";
  const tagClass = (item.tag && item.tag.toLowerCase().includes('importa')) ? 'white' : '';

  return `<a href="aeronave.html?id=${item.id}" class="ac-card">
    <div class="ac-card-img">
      ${media}
      ${item.tag ? `<div class="ac-card-badge-tab nano-tag ${tagClass}">${item.tag}</div>` : ""}
    </div>
    <div class="ac-card-body">
      <div class="ac-card-cond eyebrow dark" style="margin-bottom: 0.25rem;">${cond||"Seminovo"}</div>
      <div class="h3 ac-card-title" style="color: #fff; margin-bottom: 0.25rem;">${titleMain}<span class="light">${titleSub}</span></div>
      ${meta ? `<div class="fine-print ac-card-meta">${meta}</div>` : ""}
      <div class="ac-card-price" style="font-size: 1.125rem; font-weight: 700; color: #fff; margin-top: 1rem; margin-bottom: 1rem;">${price}</div>
      <button class="ac-card-btn">
        ${t("ac_details")}
        ${DIAGONAL_ARROW}
      </button>
    </div>
  </a>`;
}

function sellBandHTML(){
  return `<div class="ac-sell-band">
    <div>
      <p><b>PENSANDO EM</b> VENDER?</p>
      <p>${t("ac_sell_desc")}</p>
    </div>
    <a href="contato.html?motivo=vender" class="ac-sell-btn">${t("ac_sell_btn")} ${DIAGONAL_ARROW}</a>
  </div>`;
}

function buildFilters(){
  if(!allListings.length){ filtersBar.style.display = "none"; return; }
  filtersBar.style.display = "block"; /* Ajustado de '' para block */
  
  const all = t("ac_all");
  const cirrusModels = [...new Set(allListings.filter(l => l.fabricante === "Cirrus" || !l.fabricante).map(l => l.modeloBase || l.model.split(' ')[0]))].sort();
  const outrosModels = [...new Set(allListings.filter(l => l.fabricante === "Outros").map(l => l.modeloBase || l.model))].sort();

  let modeloOptions = `<option value="${all}">${all}</option>`;
  
  if(cirrusModels.length) {
    modeloOptions += `<optgroup label="Cirrus Aircraft">`;
    cirrusModels.forEach(m => { modeloOptions += `<option value="${m}">${m}</option>`; });
    modeloOptions += `</optgroup>`;
  }
  
  if(outrosModels.length) {
    modeloOptions += `<optgroup label="Outros Fabricantes">`;
    outrosModels.forEach(m => { modeloOptions += `<option value="${m}">${m}</option>`; });
    modeloOptions += `</optgroup>`;
  }
  
  elModelo.innerHTML = modeloOptions;
  fill(elCond, [all, ...[...new Set(allListings.map(l=>l.condition).filter(Boolean))].sort()]);
  fill(elAno,  [all, ...[...new Set(allListings.map(l=>String(l.year)).filter(Boolean))].sort((a,b)=>b-a)]);
}

function render(){
  const all = t("ac_all");
  if(!allListings.length){
    elGrid.innerHTML = `<div class="ac-empty">${t("ac_empty")}</div>`;
    elCount.textContent = "";
    return;
  }
  const fm = elModelo.value, fc = elCond.value, fy = elAno.value;
  
  const filtered = allListings.filter(l => {
    const matchesModel = (fm === all || l.modeloBase === fm || l.model.startsWith(fm));
    return matchesModel && (fc===all || l.condition===fc) && (fy===all || String(l.year)===fy);
  });
  
  let html = "";
  filtered.forEach((item, idx) => {
    if(idx === 4) html += sellBandHTML();
    html += cardHTML(item);
  });
  
  if(!filtered.length) html = `<div class="ac-empty">${t("ac_noresult")}</div>`;
  elGrid.innerHTML = html;
  const noun = t("ac_count_noun") || "aeronaves disponíveis";
  elCount.textContent = `${filtered.length} ${noun}`;
}

[elModelo, elCond, elAno].forEach(el => el.addEventListener("change", render));
document.addEventListener("pa:langchange", () => { buildFilters(); render(); });

async function init(){
  if(window.PA && PA.configured){
    try {
      const snap = await PA.db.collection("aircraft").get();
      const docs = snap.docs.filter(d => !d.data().archived).slice().sort((a,b) => {
        const ay = Number(a.data().year)||0, by = Number(b.data().year)||0;
        if(ay !== by) return by - ay;
        return (b.data().createdAt?.seconds||0)-(a.data().createdAt?.seconds||0);
      });
      allListings = docs.map(d => {
        const a = d.data();
        return { 
          id:d.id, tag:a.tag||"", model:a.model||"", year:a.year||"",
          fabricante: a.fabricante || "Cirrus", modeloBase: a.modeloBase || "",
          hoursNum:a.hoursNum!=null?a.hoursNum:null, condition:a.condition||"", 
          currency:a.currency||"USD", priceNum:a.priceNum||null, sobConsulta:!!a.sobConsulta,
          images:a.images||[], translations:a.translations||{} 
        };
      });
    } catch(e){ allListings = []; }
  }
  buildFilters();
  render();
}
init();
</script>
</body>
</html>
