<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aeronaves Disponíveis | Plane Aviation</title>
<link rel="stylesheet" href="styles.css">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="i18n.js" defer></script>
<script src="site.js" defer></script>
<style>
  #site-header { display: block; height: 4rem; }
  body { min-height: 100vh; }

  /* ============================================================
     AERONAVES — Layout Customizado (Tema Claro / Illustrator)
     ============================================================ */

  /* ---- PAGE HERO ---- */
  .ac-hero { padding: 4rem 0 3rem; background: hsl(var(--muted)); text-align: center; }
  .ac-eyebrow { font-size: 10px; letter-spacing: .3em; text-transform: uppercase; color: hsl(var(--muted-foreground)); font-weight: 600; margin-bottom: .875rem; }
  .ac-title { font-size: clamp(2.5rem, 6vw, 4.25rem); font-weight: 600; font-style: italic; text-transform: uppercase; letter-spacing: -.01em; line-height: 1; color: hsl(var(--foreground)); margin-bottom: 1rem; }
  .ac-sub { font-size: 1.125rem; color: hsl(var(--muted-foreground)); }

  /* ---- FILTERS ---- */
  .ac-filters-bar { background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: var(--radius-sm); padding: 1rem 1.25rem; display: flex; align-items: center; gap: 1.25rem; flex-wrap: wrap; margin-bottom: 2.5rem; }
  .ac-filters-label { display: flex; align-items: center; gap: .5rem; font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: hsl(var(--foreground)); }
  .ac-fgroup { display: flex; align-items: center; gap: .5rem; }
  .ac-fgroup > span { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: hsl(var(--muted-foreground)); }
  .ac-fgroup select { background: hsl(var(--background)); border: 1px solid hsl(var(--border)); border-radius: 4px; color: hsl(var(--foreground)); font-size: .8125rem; font-weight: 600; padding: .375rem .75rem; cursor: pointer; appearance: none; outline: none; min-width: 9rem; }
  .ac-fgroup select:focus { border-color: hsl(var(--foreground)/.4); }
  .ac-count { margin-left: auto; font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: hsl(var(--muted-foreground)); white-space: nowrap; }

  /* ---- CARD GRID ---- */
  .ac-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.25rem; }
  @media(min-width:640px)  { .ac-grid { grid-template-columns: repeat(2,1fr); gap:1.5rem; } }
  @media(min-width:1024px) { .ac-grid { grid-template-columns: repeat(4,1fr); } }

  /* ---- CARD ---- */
  .ac-card { display: block; background: hsl(var(--card)); border-radius: var(--radius-sm); overflow: hidden; border: 1px solid hsl(var(--border)); transition: transform .2s, box-shadow .2s, border-color .2s; text-decoration: none; color: inherit; padding: .75rem; cursor: pointer; }
  .ac-card:hover { transform: translateY(-3px); border-color: hsl(var(--foreground)/.3); box-shadow: 0 12px 24px rgba(0,0,0,.06); }
  .ac-card-img { position: relative; border-radius: 4px; overflow: hidden; aspect-ratio: 4/3; background: hsl(var(--muted)); margin-bottom: 1rem; }
  .ac-card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .ac-card-img .ph-dark { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: hsl(var(--muted-foreground)/.5); font-size: .7rem; letter-spacing: .1em; text-transform: uppercase; border: 2px dashed hsl(var(--border)); box-sizing: border-box;}
  .ac-card-body { padding: .25rem .375rem .5rem; }
  .ac-card-cond { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: hsl(var(--muted-foreground)); margin-bottom: .25rem; font-weight: 600; }
  .ac-card-title { font-size: 1.25rem; font-weight: 700; text-transform: uppercase; letter-spacing: -.02em; line-height: 1.1; color: hsl(var(--foreground)); margin-bottom: .25rem; }
  .ac-card-title span { font-weight: 400; }
  .ac-card-meta { font-size: .75rem; color: hsl(var(--muted-foreground)); margin-bottom: .75rem; }
  .ac-card-price { font-size: 1rem; font-weight: 700; color: hsl(var(--foreground)); margin-bottom: 1rem; letter-spacing: -.01em; }
  .ac-card-btn { display: inline-flex; align-items: center; gap: .5rem; font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: hsl(var(--foreground)); background: transparent; border: 1px solid hsl(var(--border)); border-radius: 4px; padding: .5rem .875rem; transition: background .15s, border-color .15s; white-space: nowrap; }
  .ac-card:hover .ac-card-btn { background: hsl(var(--muted)); border-color: hsl(var(--foreground)/.3); }
  .ac-card-btn svg { flex-shrink: 0; }

  /* ---- SELL BAND ---- */
  .ac-sell-band { background: hsl(var(--muted)); border: 1px solid hsl(var(--border)); border-radius: var(--radius-sm); padding: 1.75rem 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1.5rem; flex-wrap: wrap; margin: 0 0 1.5rem; grid-column: 1 / -1; }
  .ac-sell-band p:first-child { font-size: 1rem; font-weight: 600; color: hsl(var(--muted-foreground)); text-transform: uppercase; letter-spacing: .03em; margin-bottom: .25rem; }
  .ac-sell-band p:first-child b { color: hsl(var(--foreground)); font-weight: 800; }
  .ac-sell-band p:last-of-type { font-size: .875rem; color: hsl(var(--muted-foreground)); }
  .ac-sell-btn { display: inline-flex; align-items: center; gap: .5rem; font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: hsl(var(--background)); background: hsl(var(--foreground)); border-radius: var(--radius-sm); padding: .75rem 1.25rem; transition: opacity .15s; white-space: nowrap; text-decoration: none; flex-shrink: 0; }
  .ac-sell-btn:hover { opacity: .85; }

  /* ---- EMPTY ---- */
  .ac-empty { grid-column: 1/-1; padding: 5rem 0; text-align: center; color: hsl(var(--muted-foreground)); font-size: .875rem; }
</style>
</head>
<body>
<div id="site-header"></div>
<main>
  <section class="ac-hero">
    <div class="container">
      <p class="ac-eyebrow" data-i18n="ac_eyebrow">Estoque</p>
      <h1 class="ac-title" data-i18n="ac_title">Aeronaves Disponíveis</h1>
      <p class="ac-sub" data-i18n="ac_sub">Unidades certificadas, inspecionadas e prontas para entrega.</p>
    </div>
  </section>

  <section style="padding: 3rem 0 5rem;">
    <div class="container">
      <div class="ac-filters-bar" id="filtersBar" style="display:none">
        <div class="ac-filters-label">
          <svg style="width:1rem;height:1rem;stroke:currentColor;fill:none;stroke-width:2" viewBox="0 0 24 24"><line x1="21" x2="14" y1="4" y2="4"/><line x1="10" x2="3" y1="4" y2="4"/><line x1="21" x2="12" y1="12" y2="12"/><line x1="8" x2="3" y1="12" y2="12"/><line x1="21" x2="16" y1="20" y2="20"/><line x1="12" x2="3" y1="20" y2="20"/><line x1="14" x2="14" y1="2" y2="6"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="16" x2="16" y1="18" y2="22"/></svg>
          <span data-i18n="ac_filters">Filtros</span>
        </div>
        <div class="ac-fgroup">
          <span data-i18n="ac_model">Modelo:</span>
          <select id="fModelo"></select>
        </div>
        <div class="ac-fgroup">
          <span data-i18n="ac_condition">Condição:</span>
          <select id="fCondicao"></select>
        </div>
        <div class="ac-fgroup">
          <span data-i18n="ac_year">Ano:</span>
          <select id="fAno"></select>
        </div>
        <span class="ac-count" id="count"></span>
      </div>

      <div class="ac-grid" id="grid"></div>
    </div>
  </section>
</main>
<div id="site-footer"></div>

<script src="firebase-config.js"></script>
<script>
const ARROW = '<svg viewBox="0 0 24.68 24.68" xmlns="http://www.w3.org/2000/svg" style="width:.9em;height:.9em;flex-shrink:0;fill:currentColor;display:inline-block;vertical-align:middle"><polygon points="0 0 0 2 21.26 2 0 23.26 1.42 24.67 22.68 3.41 22.68 24.68 24.68 24.68 24.68 0 0 0"/></svg>';

let allListings = [];
const elModelo  = document.getElementById("fModelo");
const elCond    = document.getElementById("fCondicao");
const elAno     = document.getElementById("fAno");
const elGrid    = document.getElementById("grid");
const elCount   = document.getElementById("count");
const filtersBar= document.getElementById("filtersBar");

function t(k){ return window.PA_I18N ? PA_I18N.t(k) : k; }
function getLang(){ return window.PA_I18N ? PA_I18N.getLang() : "pt"; }

function fill(el, opts){
  el.innerHTML = opts.map(o => `<option>${o}</option>`).join("");
}

function getLocalizedCondition(item){
  const lang = getLang();
  if(lang === "pt") return item.condition || "";
  return item.translations?.[lang]?.condition || item.condition || "";
}

function formatPrice(item){
  if(item.sobConsulta || !item.priceNum) return t("ac_consult");
  return item.currency === "BRL"
    ? "R$ " + Number(item.priceNum).toLocaleString("pt-BR")
    : "USD " + Number(item.priceNum).toLocaleString("en-US");
}

function hoursLabel(item){
  if(item.hoursNum == null) return "";
  return `${Number(item.hoursNum).toLocaleString("pt-BR")}h`;
}

function cardHTML(item){
  const cond = getLocalizedCondition(item);
  const price = formatPrice(item);
  const hours = hoursLabel(item);
  const meta = [item.year, hours].filter(Boolean).join(" • ");
  const media = (item.images && item.images[0])
    ? `<img src="${item.images[0]}" alt="${item.model}" loading="lazy">`
    : `<div class="ph-dark">[Sem Imagem]</div>`;
  const titleParts = item.model.match(/^(.*?)(\s[A-Z0-9+]+)?$/);
  const titleMain = titleParts ? titleParts[1] : item.model;
  const titleSub  = titleParts && titleParts[2] ? titleParts[2] : "";
  
  return `<a href="aeronave.html?id=${item.id}" class="ac-card">
    <div class="ac-card-img">${media}</div>
    <div class="ac-card-body">
      <div class="ac-card-cond">${cond}</div>
      <div class="ac-card-title">${titleMain}<span>${titleSub}</span></div>
      ${meta ? `<div class="ac-card-meta">${meta}</div>` : ""}
      <div class="ac-card-price">${price}</div>
      <span class="ac-card-btn">${t("ac_details")} ${ARROW}</span>
    </div>
  </a>`;
}

function sellBandHTML(){
  return `<div class="ac-sell-band">
    <div>
      <p><b>PENSANDO EM</b> VENDER?</p>
      <p>${t("ac_sell_desc")}</p>
    </div>
    <a href="contato.html?motivo=vender" class="ac-sell-btn">${t("ac_sell_btn")} ${ARROW}</a>
  </div>`;
}

function buildFilters(){
  if(!allListings.length){ filtersBar.style.display = "none"; return; }
  filtersBar.style.display = "";
  const all = t("ac_all");
  fill(elModelo, [all, ...[...new Set(allListings.map(l=>l.model).filter(Boolean))].sort()]);
  fill(elCond,   [all, ...[...new Set(allListings.map(l=>l.condition).filter(Boolean))].sort()]);
  fill(elAno,    [all, ...[...new Set(allListings.map(l=>String(l.year)).filter(Boolean))].sort((a,b)=>b-a)]);
}

function render(){
  const all = t("ac_all");
  if(!allListings.length){
    elGrid.innerHTML = `<div class="ac-empty">${t("ac_empty")}</div>`;
    elCount.textContent = "";
    return;
  }
  const fm = elModelo.value, fc = elCond.value, fy = elAno.value;
  const filtered = allListings.filter(l => {
    return (fm===all || l.model===fm)
        && (fc===all || l.condition===fc)
        && (fy===all || String(l.year)===fy);
  });
  let html = "";
  filtered.forEach((item, idx) => {
    if(idx === 4) html += sellBandHTML();
    html += cardHTML(item);
  });
  if(!filtered.length) html = `<div class="ac-empty">${t("ac_noresult")}</div>`;
  elGrid.innerHTML = html;
  const noun = t("ac_count_noun") || "aeronaves disponíveis";
  elCount.textContent = `${filtered.length} ${noun}`;
}

[elModelo, elCond, elAno].forEach(el => el.addEventListener("change", render));
document.addEventListener("pa:langchange", () => { buildFilters(); render(); });

async function init(){
  if(window.PA && PA.configured){
    try {
      const snap = await PA.db.collection("aircraft").get();
      const docs = snap.docs.slice().sort((a,b) => {
        const ao=a.data().order, bo=b.data().order;
        if(ao!=null&&bo!=null) return ao-bo;
        if(ao!=null) return -1; if(bo!=null) return 1;
        return (b.data().createdAt?.seconds||0)-(a.data().createdAt?.seconds||0);
      });
      allListings = docs.map(d => {
        const a = d.data();
        return { id:d.id, tag:a.tag||"", model:a.model||"", year:a.year||"",
          hoursNum:a.hoursNum!=null?a.hoursNum:null,
          condition:a.condition||"", currency:a.currency||"USD",
          priceNum:a.priceNum||null, sobConsulta:!!a.sobConsulta,
          images:a.images||[], translations:a.translations||{} };
      });
    } catch(e){ allListings = []; console.error(e); }
  }
  buildFilters();
  render();
}

// Inicia logo após o carregamento do DOM
document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
