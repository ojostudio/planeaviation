<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aeronaves Disponíveis | Plane Aviation</title>
<link rel="stylesheet" href="styles.css">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="i18n.js" defer></script>
<script src="site.js" defer></script>
<style>
  /* ============================================================
     TEMA ESCURO — Apenas para esta página
     ============================================================ */
  #site-header { display: block; height: 4rem; background: hsl(0, 0%, 5%); } /* Header preto */
  body { background-color: hsl(0, 0%, 5%); color: #fff; min-height: 100vh; }
  
  /* Sobrescrita de variáveis do Design System para o tema escuro */
  :root {
    --foreground: 0 0% 100%;
    --muted: 0 0% 10%;
    --muted-foreground: 0 0% 60%;
    --border: 0 0% 15%;
    --card: 0 0% 8%;
    --font: 'Grift', ui-sans-serif, system-ui, sans-serif; /* Garante Grift */
  }

  /* ============================================================
     AERONAVES — Layout do Illustrator (Vertical, Glasmorfismo, Bevel)
     ============================================================ */

  /* ---- PAGE HERO ---- */
  .ac-hero { padding: 5rem 0 4rem; text-align: center; background: radial-gradient(circle at center, hsl(0, 0%, 15%), hsl(0, 0%, 5%) 70%); }
  .ac-eyebrow { font-size: 10px; letter-spacing: .3em; text-transform: uppercase; color: hsl(var(--muted-foreground)); font-weight: 600; margin-bottom: 1rem; }
  .ac-title { font-size: clamp(2.5rem, 6vw, 4.25rem); font-weight: 600; font-style: italic; text-transform: uppercase; letter-spacing: -.01em; line-height: 1; color: #fff; margin-bottom: 1.25rem; }
  .ac-sub { font-size: 1.125rem; color: hsl(var(--muted-foreground)); max-width: 600px; margin: 0 auto; }

  /* ---- FILTERS (Com Glasmorfismo e Bevel) ---- */
  .ac-filters-bar { background: hsla(0, 0%, 10%, 0.5); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid hsla(0,0%,100%,.1); border-radius: 12px; padding: 1.25rem; display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; margin-bottom: 3rem; position: sticky; top: 1rem; z-index: 10; box-shadow: 0 8px 32px rgba(0,0,0,.3); background-image: linear-gradient(135deg, hsla(0,0%,100%,.05) 0%, hsla(0,0%,0%,.05) 100%); }
  .ac-filters-label { display: flex; align-items: center; gap: .5rem; font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #fff; }
  .ac-fgroup { display: flex; align-items: center; gap: .5rem; }
  .ac-fgroup > span { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: hsl(var(--muted-foreground)); }
  .ac-fgroup select { background: hsl(0, 0%, 12%); border: 1px solid hsl(0, 0%, 20%); border-radius: 6px; color: #fff; font-size: .8125rem; font-weight: 600; padding: .5rem .875rem; cursor: pointer; appearance: none; outline: none; min-width: 10rem; background-image: linear-gradient(135deg, hsla(0,0%,100%,.02) 0%, hsla(0,0%,0%,.02) 100%);}
  .ac-fgroup select:focus { border-color: hsla(0,0%,100%,.3); }
  .ac-count { margin-left: auto; font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: hsl(var(--muted-foreground)); white-space: nowrap; }

  /* ---- CARD GRID (Vertical) ---- */
  .ac-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
  @media(min-width:768px) { .ac-grid { grid-template-columns: repeat(2,1fr); gap: 2rem; } }
  @media(min-width:1280px) { .ac-grid { grid-template-columns: repeat(4,1fr); gap: 1.5rem; } }

  /* ---- CARD (Vertical, Glasmorfismo, Bevel/Efeito de Luz) ---- */
  .ac-card { display: flex; flex-direction: column; background: hsla(0, 0%, 12%, 0.5); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border-radius: 12px; overflow: hidden; border: 1px solid hsla(0,0%,100%,.1); transition: transform .3s, box-shadow .3s, border-color .3s; text-decoration: none; color: inherit; padding: 1.25rem; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,.2); background-image: linear-gradient(135deg, hsla(0,0%,100%,.05) 0%, hsla(0,0%,0%,.15) 100%);}
  .ac-card:hover { transform: translateY(-5px); border-color: hsla(0,0%,100%,.2); box-shadow: 0 15px 40px rgba(0,0,0,.4); background-image: linear-gradient(135deg, hsla(0,0%,100%,.1) 0%, hsla(0,0%,0%,.25) 100%); }
  .ac-card-img { position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 4/3; background: hsl(0, 0%, 8%); margin-bottom: 1.5rem; }
  .ac-card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .ac-card-img .ph-dark { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: hsl(var(--muted-foreground)/.5); font-size: .7rem; letter-spacing: .1em; text-transform: uppercase; border: 2px dashed hsl(0, 0%, 20%); box-sizing: border-box;}
  .ac-card-cond { font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: hsl(var(--muted-foreground)); margin-bottom: .5rem; font-weight: 600; }
  .ac-card-title { font-size: 1.5rem; font-weight: 600; font-style: italic; text-transform: uppercase; letter-spacing: -.02em; line-height: 1; color: #fff; margin-bottom: .5rem; }
  .ac-card-title span { font-weight: 400; font-style: normal; }
  .ac-card-meta { font-size: .8125rem; color: hsl(var(--muted-foreground)); margin-bottom: 1.25rem; font-weight: 500; }
  .ac-card-price { font-size: 1.25rem; font-weight: 700; color: #fff; margin-bottom: 1.5rem; letter-spacing: -.02em; line-height: 1;}
  /* Botão de Detalhes integrado ao card */
  .ac-card-btn { display: inline-flex; align-items: center; justify-content: center; gap: .6rem; font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #fff; background: hsl(0, 0%, 15%); border: 1px solid hsl(0, 0%, 20%); border-radius: 6px; padding: .75rem 1.25rem; transition: background .15s, border-color .15s; white-space: nowrap; width: 100%; background-image: linear-gradient(135deg, hsla(0,0%,100%,.02) 0%, hsla(0,0%,0%,.05) 100%); }
  .ac-card:hover .ac-card-btn { background: hsl(0, 0%, 20%); border-color: hsla(0,0%,100%,.2); }
  .ac-card-btn svg { height: 1.2em; width: auto; flex-shrink: 0; fill: currentColor; }

  /* ---- SELL BAND (Com Glasmorfismo e Bevel) ---- */
  .ac-sell-band { background: hsla(0, 0%, 12%, 0.5); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid hsla(0,0%,100%,.1); border-radius: 12px; padding: 2.5rem; display: flex; align-items: center; justify-content: space-between; gap: 2rem; flex-wrap: wrap; margin-bottom: 2rem; grid-column: 1 / -1; box-shadow: 0 10px 30px rgba(0,0,0,.3); background-image: linear-gradient(135deg, hsla(0,0%,100%,.05) 0%, hsla(0,0%,0%,.15) 100%);}
  .ac-sell-band p:first-child { font-size: 1rem; font-weight: 600; color: hsl(var(--muted-foreground)); text-transform: uppercase; letter-spacing: .03em; margin-bottom: .5rem; }
  .ac-sell-band p:first-child b { color: #fff; font-weight: 800; }
  .ac-sell-band p:last-of-type { font-size: .9375rem; color: hsl(var(--muted-foreground)); max-width: 600px; }
  /* Botão da chamada de venda com a setinha */
  .ac-sell-btn { display: inline-flex; align-items: center; gap: .6rem; font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: hsl(0, 0%, 5%); background: #fff; border-radius: 6px; padding: .875rem 1.5rem; transition: opacity .15s; white-space: nowrap; text-decoration: none; flex-shrink: 0; box-shadow: 0 4px 12px rgba(0,0,0,.2); }
  .ac-sell-btn:hover { opacity: .85; }
  .ac-sell-btn svg { height: 1.2em; width: auto; flex-shrink: 0; fill: currentColor; }

  /* ---- EMPTY ---- */
  .ac-empty { grid-column: 1/-1; padding: 7rem 0; text-align: center; color: hsl(var(--muted-foreground)); font-size: .875rem; background: hsl(var(--muted)); border-radius: 12px; border: 1px dashed hsl(var(--border));}
</style>
</head>
<body>
<div id="site-header"></div>
<main style="padding-bottom: 7rem;">
  <section class="ac-hero">
    <div class="container">
      <p class="ac-eyebrow" data-i18n="ac_eyebrow">Estoque</p>
      <h1 class="ac-title" data-i18n="ac_title">Aeronaves Disponíveis</h1>
      <p class="ac-sub" data-i18n="ac_sub">Unidades certificadas, inspecionadas e prontas para entrega.</p>
    </div>
  </section>

  <section>
    <div class="container">
      <div class="ac-filters-bar" id="filtersBar" style="display:none">
        <div class="ac-filters-label">
          <svg style="width:1.2rem;height:1.2rem;stroke:currentColor;fill:none;stroke-width:2" viewBox="0 0 24 24"><line x1="21" x2="14" y1="4" y2="4"/><line x1="10" x2="3" y1="4" y2="4"/><line x1="21" x2="12" y1="12" y2="12"/><line x1="8" x2="3" y1="12" y2="12"/><line x1="21" x2="16" y1="20" y2="20"/><line x1="12" x2="3" y1="20" y2="20"/><line x1="14" x2="14" y1="2" y2="6"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="16" x2="16" y1="18" y2="22"/></svg>
          <span data-i18n="ac_filters">Filtros</span>
        </div>
        <div class="ac-fgroup">
          <span data-i18n="ac_model">Modelo:</span>
          <select id="fModelo"></select>
        </div>
        <div class="ac-fgroup">
          <span data-i18n="ac_condition">Condição:</span>
          <select id="fCondicao"></select>
        </div>
        <div class="ac-fgroup">
          <span data-i18n="ac_year">Ano:</span>
          <select id="fAno"></select>
        </div>
        <span class="ac-count" id="count"></span>
      </div>

      <div class="ac-grid" id="grid"></div>
    </div>
  </section>
</main>
<div id="site-footer"></div>

<script src="firebase-config.js"></script>
<script>
let allListings = [];
const elModelo  = document.getElementById("fModelo");
const elCond    = document.getElementById("fCondicao");
const elAno     = document.getElementById("fAno");
const elGrid    = document.getElementById("grid");
const elCount   = document.getElementById("count");
const filtersBar= document.getElementById("filtersBar");

function t(k){ return window.PA_I18N ? PA_I18N.t(k) : k; }
function getLang(){ return window.PA_I18N ? PA_I18N.getLang() : "pt"; }

function fill(el, opts){
  el.innerHTML = opts.map(o => `<option>${o}</option>`).join("");
}

function getLocalizedCondition(item){
  const lang = getLang();
  if(lang === "pt") return item.condition || "";
  return item.translations?.[lang]?.condition || item.condition || "";
}

function formatPrice(item){
  if(item.sobConsulta || !item.priceNum) return t("ac_consult");
  return item.currency === "BRL"
    ? "R$ " + Number(item.priceNum).toLocaleString("pt-BR")
    : "USD " + Number(item.priceNum).toLocaleString("en-US");
}

function hoursLabel(item){
  if(item.hoursNum == null) return "";
  return `${Number(item.hoursNum).toLocaleString("pt-BR")}h`;
}

function cardHTML(item){
  const cond = getLocalizedCondition(item);
  const price = formatPrice(item);
  const hours = hoursLabel(item);
  const meta = [item.year, hours].filter(Boolean).join(" • ");
  const media = (item.images && item.images[0])
    ? `<img src="${item.images[0]}" alt="${item.model}" loading="lazy">`
    : `<div class="ph-dark">[Sem Imagem]</div>`;
  const titleParts = item.model.match(/^(.*?)(\s[A-Z0-9+]+)?$/);
  const titleMain = titleParts ? titleParts[1] : item.model;
  const titleSub  = titleParts && titleParts[2] ? titleParts[2] : "";
  
  return `<a href="aeronave.html?id=${item.id}" class="ac-card">
    <div class="ac-card-img">${media}</div>
    <div class="ac-card-cond">${cond}</div>
    <div class="ac-card-title">${titleMain}<span>${titleSub}</span></div>
    ${meta ? `<div class="ac-card-meta">${meta}</div>` : ""}
    <div class="ac-card-price">${price}</div>
    <span class="ac-card-btn">
      ${t("ac_details")}
      ${SVG_ARROW}
    </span>
  </a>`;
}

function sellBandHTML(){
  return `<div class="ac-sell-band">
    <div>
      <p><b>PENSANDO EM</b> VENDER?</p>
      <p>${t("ac_sell_desc")}</p>
    </div>
    <a href="contato.html?motivo=vender" class="ac-sell-btn">
      ${t("ac_sell_btn")}
      ${SVG_ARROW}
    </a>
  </div>`;
}

function buildFilters(){
  if(!allListings.length){ filtersBar.style.display = "none"; return; }
  filtersBar.style.display = "";
  const all = t("ac_all");
  fill(elModelo, [all, ...[...new Set(allListings.map(l=>l.model).filter(Boolean))].sort()]);
  fill(elCond,   [all, ...[...new Set(allListings.map(l=>l.condition).filter(Boolean))].sort()]);
  fill(elAno,    [all, ...[...new Set(allListings.map(l=>String(l.year)).filter(Boolean))].sort((a,b)=>b-a)]);
}

function render(){
  const all = t("ac_all");
  if(!allListings.length){
    elGrid.innerHTML = `<div class="ac-empty">${t("ac_empty")}</div>`;
    elCount.textContent = "";
    return;
  }
  const fm = elModelo.value, fc = elCond.value, fy = elAno.value;
  const filtered = allListings.filter(l => {
    return (fm===all || l.model===fm)
        && (fc===all || l.condition===fc)
        && (fy===all || String(l.year)===fy);
  });
  let html = "";
  filtered.forEach((item, idx) => {
    // Chamada de venda inserida no meio do grid (após o 4º card)
    if(idx === 4) html += sellBandHTML();
    html += cardHTML(item);
  });
  if(!filtered.length) html = `<div class="ac-empty">${t("ac_noresult")}</div>`;
  elGrid.innerHTML = html;
  const noun = t("ac_count_noun") || "aeronaves disponíveis";
  elCount.textContent = `${filtered.length} ${noun}`;
}

[elModelo, elCond, elAno].forEach(el => el.addEventListener("change", render));
document.addEventListener("pa:langchange", () => { buildFilters(); render(); });

async function init(){
  if(window.PA && PA.configured){
    try {
      const snap = await PA.db.collection("aircraft").get();
      const docs = snap.docs.slice().sort((a,b) => {
        const ao=a.data().order, bo=b.data().order;
        if(ao!=null&&bo!=null) return ao-bo;
        if(ao!=null) return -1; if(bo!=null) return 1;
        return (b.data().createdAt?.seconds||0)-(a.data().createdAt?.seconds||0);
      });
      allListings = docs.map(d => {
        const a = d.data();
        return { id:d.id, tag:a.tag||"", model:a.model||"", year:a.year||"",
          hoursNum:a.hoursNum!=null?a.hoursNum:null,
          condition:a.condition||"", currency:a.currency||"USD",
          priceNum:a.priceNum||null, sobConsulta:!!a.sobConsulta,
          images:a.images||[], translations:a.translations||{} };
      });
    } catch(e){ allListings = []; console.error(e); }
  }
  buildFilters();
  render();
}

// Inicia logo após o carregamento do DOM
document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
