<script>
/* seo-links: resolve URL bonita de aeronave/artigo via manifesto gerado,
   com fallback automático pro link antigo se o manifesto ainda não existir. */
window.PA_LINKS = (function () {
  var aircraftMap = null, articleMap = null;
  function loadAircraftMap() {
    if (aircraftMap) return Promise.resolve(aircraftMap);
    return fetch("aeronaves/index.json", { cache: "no-store" })
      .then(function(r){ return r.ok ? r.json() : {}; })
      .catch(function(){ return {}; })
      .then(function(m){ aircraftMap = m; return m; });
  }
  function loadArticleMap() {
    if (articleMap) return Promise.resolve(articleMap);
    return fetch("artigos/index.json", { cache: "no-store" })
      .then(function(r){ return r.ok ? r.json() : {}; })
      .catch(function(){ return {}; })
      .then(function(m){ articleMap = m; return m; });
  }
  function aircraftUrl(id) {
    return aircraftMap && aircraftMap[id] ? "aeronaves/" + aircraftMap[id] + "/" : "aeronave.html?id=" + id;
  }
  function articleUrl(id) {
    return articleMap && articleMap[id] ? "artigos/" + articleMap[id] + "/" : "artigo.html?id=" + id;
  }
  return { loadAircraftMap: loadAircraftMap, loadArticleMap: loadArticleMap, aircraftUrl: aircraftUrl, articleUrl: articleUrl };
})();
</script>

<script>
const ARROW = '<svg class="icon-arrow-diag" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M7 7h10v10"/></svg>';

const ICONS = {
  Shield:'<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>',
  Monitor:'<rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/>',
  Navigation:'<polygon points="3 11 22 2 13 21 11 13 3 11"/>',
  Gauge:'<path d="m12 14 4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/>',
  Zap:'<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>',
  Wind:'<path d="M12.8 19.6A2 2 0 1 0 14 16H2"/><path d="M17.5 8a2.5 2.5 0 1 1 2 4H2"/><path d="M9.8 4.4A2 2 0 1 1 11 8H2"/>',
  Award:'<circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/>'
};

function t(k){ return window.PA_I18N ? PA_I18N.t(k) : k; }
function getLang(){ return window.PA_I18N ? PA_I18N.getLang() : "pt"; }
function getLocalized(p,f){ const l=getLang(); return l==="pt"?p[f]||"":(p.translations?.[l]?.[f]||p[f]||""); }
function getLocalizedArray(p,f){ const l=getLang(); return l==="pt"?p[f]||[]:(p.translations?.[l]?.[f]||p[f]||[]); }

const pageId = window.__AIRCRAFT_ID__ || new URLSearchParams(location.search).get("id");

// Link antigo (aeronave.html?id=X) acessado diretamente: se já existir uma
// página própria gerada para essa aeronave, manda o visitante pra lá (URL
// bonita, com preview/OG corretos). Se ainda não existir (aeronave muito
// recente, ou o gerador ainda não rodou), a página continua funcionando
// normalmente aqui mesmo — não quebra nada.
if (!window.__AIRCRAFT_ID__ && pageId) {
  fetch("aeronaves/index.json", { cache: "no-store" })
    .then(r => r.ok ? r.json() : null)
    .then(map => { if (map && map[pageId]) location.replace(`aeronaves/${map[pageId]}/`); })
    .catch(() => {});
}
let P = null, activeImg = 0;

document.addEventListener("pa:langchange", () => { if(P) renderPage(P); });

const galMainEl = document.getElementById("galMain");
const thumbsEl  = document.getElementById("thumbs");

function hasImgs(){ return P && P.images && P.images.length; }

function paintMain(){
  const existing = galMainEl.querySelector("img, .ph-dark");
  if(existing) existing.remove();
  if(hasImgs()){
    const img = document.createElement("img");
    img.src = P.images[activeImg];
    img.alt = P.model;
    galMainEl.prepend(img);
  }
}
function paintThumbs(){
  if(!hasImgs()){ thumbsEl.innerHTML=""; return; }
  thumbsEl.innerHTML = P.images.map((url,i) =>
    `<button class="${i===activeImg?"active":""}" data-i="${i}"><img src="${url}" alt="${P.model} ${i+1}"></button>`).join("");
  thumbsEl.querySelectorAll("button").forEach(b =>
    b.addEventListener("click", () => { activeImg=+b.dataset.i; paintMain(); paintThumbs(); }));
}
document.getElementById("galPrev").addEventListener("click", () => { if(!hasImgs()) return; activeImg=(activeImg-1+P.images.length)%P.images.length; paintMain(); paintThumbs(); });
document.getElementById("galNext").addEventListener("click", () => { if(!hasImgs()) return; activeImg=(activeImg+1)%P.images.length; paintMain(); paintThumbs(); });

function fmtPrice(p){
  if(p.sobConsulta || !p.priceNum) return null;
  return p.currency==="BRL" ? "R$"+Number(p.priceNum).toLocaleString("pt-BR") : "USD "+Number(p.priceNum).toLocaleString("en-US");
}
function fmtHoras(n){ return n!=null ? Number(n).toLocaleString("pt-BR")+"h" : null; }

// Atualiza meta description/OG e injeta dados estruturados (Vehicle) assim que a
// aeronave carrega. Ajuda o Google (que executa JS) a entender a página melhor
// desde já — a geração de página estática por aeronave (URL própria, sem depender
// de JS) é a etapa seguinte do trabalho de SEO.
function updateSeoTags(p, loc_desc, loc_cond){
  const title = `${p.model}${p.year ? " "+p.year : ""} | Plane Aviation`;
  const desc = (loc_desc || `${p.model}${p.year ? ", "+p.year : ""}${loc_cond ? " — "+loc_cond : ""}. Aeronave Cirrus disponível na Plane Aviation, representante exclusiva da marca no Brasil.`).slice(0, 300);
  const img = (p.images && p.images[0]) || "https://www.planeaviation.net.br/images/og-cover.jpg";

  document.querySelector('meta[name="description"]')?.setAttribute("content", desc);
  document.querySelector('meta[property="og:title"]')?.setAttribute("content", title);
  document.querySelector('meta[property="og:description"]')?.setAttribute("content", desc);
  document.querySelector('meta[property="og:image"]')?.setAttribute("content", img);
  document.querySelector('meta[name="twitter:title"]')?.setAttribute("content", title);
  document.querySelector('meta[name="twitter:description"]')?.setAttribute("content", desc);
  document.querySelector('meta[name="twitter:image"]')?.setAttribute("content", img);

  let ld = document.getElementById("aircraft-jsonld");
  if (!ld) {
    ld = document.createElement("script");
    ld.type = "application/ld+json";
    ld.id = "aircraft-jsonld";
    document.head.appendChild(ld);
  }
  ld.textContent = JSON.stringify({
    "@context": "https://schema.org",
    "@type": "Product",
    "name": p.model,
    "description": desc,
    "image": p.images || [],
    "brand": { "@type": "Brand", "name": "Cirrus Aircraft" },
    "itemCondition": /novo|new/i.test(loc_cond||"") ? "https://schema.org/NewCondition" : "https://schema.org/UsedCondition",
    ...(p.priceNum ? {
      "offers": {
        "@type": "Offer",
        "priceCurrency": p.currency || "USD",
        "price": p.priceNum,
        "availability": "https://schema.org/InStock",
        "url": location.href
      }
    } : {})
  });
}

function renderPage(p){
  P = p;
  if(!P._init){ activeImg=0; P._init=true; paintMain(); paintThumbs(); }

  const loc_cond  = getLocalized(p,"condition");
  const loc_loc   = getLocalized(p,"location");
  const loc_desc  = getLocalized(p,"description");
  const loc_specs = getLocalizedArray(p,"specs");
  const loc_feats = getLocalizedArray(p,"features");

  document.getElementById("crumbModel").textContent = p.model + (p.year ? " — "+p.year : "");
  document.getElementById("condLoc").textContent = [loc_cond, loc_loc].filter(Boolean).join(" · ");
  document.title = `${p.model} | Plane Aviation`;
  updateSeoTags(p, loc_desc, loc_cond);

  const parts = p.model.match(/^(.*?)(\s[A-Z0-9+]+)?$/);
  const main = parts?.[1] || p.model;
  const sub  = parts?.[2] || "";
  document.getElementById("model").innerHTML = `${main}<span>${sub}</span>`;

  const tagEl = document.getElementById("galTag");
  if(p.tag){ tagEl.textContent=p.tag; tagEl.style.display=""; } else { tagEl.style.display="none"; }

  const metas = [];
  if(p.year)              metas.push({ l:t("det_meta_year"),   v:String(p.year) });
  if(p.hoursNum!=null)    metas.push({ l:t("det_meta_cell"),   v:fmtHoras(p.hoursNum) });
  if(p.motorHours!=null)  metas.push({ l:t("det_meta_engine"), v:fmtHoras(p.motorHours) });
  if(p.heliceHours!=null) metas.push({ l:t("det_meta_prop"),   v:fmtHoras(p.heliceHours) });
  document.getElementById("detMetas").innerHTML = metas.map(m => `<span class="det-meta-pill"><span class="ml">${m.l}</span>${m.v}</span>`).join("");

  const priceEl = document.getElementById("detPrice");
  const price = fmtPrice(p);
  if(price){ priceEl.textContent=price; priceEl.className="det-price"; } else { priceEl.textContent=t("ac_consult"); priceEl.className="det-price consult"; }

  const descBlock = document.getElementById("descBlock");
  if(loc_desc){ document.getElementById("descLabel").textContent = t("det_about"); document.getElementById("descText").textContent  = loc_desc; descBlock.style.display="block"; } else { descBlock.style.display="none"; }

  const specsBlock = document.getElementById("specsBlock");
  const specsHTML = loc_specs.filter(s=>s[0]||s[1]).map(s => `<div class="det-spec-row"><span class="det-spec-key">${s[0]||""}</span><span class="det-spec-val">${s[1]||""}</span></div>`).join("");
  if(specsHTML){ document.getElementById("specs").innerHTML = specsHTML; document.getElementById("specsLabel").textContent = t("det_specs"); specsBlock.style.display="block"; } else { specsBlock.style.display="none"; }

  const featsSection = document.getElementById("featsSection");
  const featsHTML = loc_feats.filter(f=>f[1]||f[2]).map(f => `<div class="det-tech-card"><svg class="icon i-5" viewBox="0 0 24 24">${ICONS[f[0]]||ICONS.Shield}</svg><h3>${f[1]||""}</h3><p>${f[2]||""}</p></div>`).join("");
  if(featsHTML){ document.getElementById("feats").innerHTML = featsHTML; document.getElementById("featsLabel").textContent = t("det_tech"); featsSection.style.display="block"; } else { featsSection.style.display="none"; }

  const telefoneWhatsapp = "5511999990000"; 
  const codInterno = p.codigoInterno || "Sem Cód";
  const textoMensagem = encodeURIComponent(`Olá! Tenho interesse na aeronave ${main} ${sub} (${codInterno}).`);
  document.getElementById("btnWhatsApp").href = `https://wa.me/${telefoneWhatsapp}?text=${textoMensagem}`;

  const modalSelect = document.getElementById("modalAircraftSelect");
  modalSelect.innerHTML = `<option value="${p.model} [${codInterno}]" selected>${p.model} (${p.year})</option>`;
}

function notFound(){
  document.getElementById("detWrap").innerHTML = `<div class="container" style="padding:5rem 0;text-align:center"><p class="eyebrow dark" data-i18n="ac_eyebrow">Estoque</p><h1 class="h-display" style="color:#fff;margin-bottom:1rem" data-i18n="det_notfound">Aeronave não encontrada</h1><a href="aeronaves.html" class="btn btn-solid" data-i18n="det_back">Ver Aeronaves Disponíveis</a></div>`;
  if(window.PA_I18N) PA_I18N.applyLang();
}

function fromFirestore(a){
  return { tag:a.tag||"", model:a.model||"", year:a.year||"", hoursNum:a.hoursNum!=null?a.hoursNum:null, motorHours:a.motorHours!=null?a.motorHours:null, heliceHours:a.heliceHours!=null?a.heliceHours:null, condition:a.condition||"", currency:a.currency||"USD", priceNum:a.priceNum!=null?a.priceNum:null, sobConsulta:!!a.sobConsulta, location:a.location||"", description:a.description||"", codigoInterno:a.codigoInterno||"", translations:a.translations||{}, images:a.images||[], specs:(a.specs||[]).map(s=>[s.label,s.value]), features:(a.features||[]).map(f=>[f.icon,f.title,f.desc]) };
}

function otherCardHTML(id, a){
  const parts = (a.model||"").match(/^(.*?)(\s[A-Z0-9+]+)?$/); const main = parts?.[1]||a.model||""; const sub  = parts?.[2]||"";
  const price = (a.sobConsulta||!a.priceNum) ? t("ac_consult") : (a.currency==="BRL"?"R$":"USD ")+Number(a.priceNum).toLocaleString(a.currency==="BRL"?"pt-BR":"en-US");
  const meta = [a.year, a.hoursNum!=null?Number(a.hoursNum).toLocaleString("pt-BR")+"h":null].filter(Boolean).join(" · ");
  const img = (a.images&&a.images[0]) ? `<img src="${a.images[0]}" alt="${a.model}">` : `<div class="ph-dark">[Foto]</div>`;
  return `<a href="${PA_LINKS.aircraftUrl(id)}" class="ac-card">
    <div class="ac-card-img">
      ${img}
      ${a.tag?`<div class="ac-card-badge-tab nano-tag">${a.tag}</div>`:""}
    </div>
    <div class="ac-card-body">
      <div class="ac-card-cond eyebrow dark" style="margin-bottom:0.25rem;">${a.condition||""}</div>
      <div class="h3 ac-card-title" style="color:#fff; margin-bottom:0.25rem;">${main}<span class="light">${sub}</span></div>
      ${meta?`<div class="fine-print ac-card-meta">${meta}</div>`:""}
      <div class="ac-card-price" style="font-size: 1.125rem; font-weight: 700; color: #fff; margin-top: 1rem; margin-bottom: 1rem;">${price}</div>
      <span class="ac-card-btn">${t("ac_details")} ${ARROW}</span>
    </div>
  </a>`;
}

async function init(){
  await PA_LINKS.loadAircraftMap();
  if(!window.PA || !PA.configured || !pageId){ notFound(); return; }
  try {
    const doc = await PA.db.collection("aircraft").doc(pageId).get();
    if(!doc.exists || doc.data().archived){ notFound(); return; }
    renderPage(fromFirestore(doc.data()));

    const others = await PA.db.collection("aircraft").get();
    const otherDocs = others.docs.filter(d=>d.id!==pageId && !d.data().archived).sort((a,b)=>{ const ay = Number(a.data().year)||0, by = Number(b.data().year)||0; if(ay !== by) return by - ay; return (b.data().createdAt?.seconds||0)-(a.data().createdAt?.seconds||0); }).slice(0,4);
    if(otherDocs.length){ document.getElementById("otherSection").style.display="block"; document.getElementById("otherGrid").innerHTML = otherDocs.map(d=>otherCardHTML(d.id,d.data())).join(""); }
  } catch(e){ notFound(); }
}

document.addEventListener("DOMContentLoaded", () => {
  const btnOpen = document.getElementById("btnOpenContactModal");
  const btnClose = document.getElementById("btnCloseModal");
  const modalOverlay = document.getElementById("contactModal");

  if(btnOpen && btnClose && modalOverlay) {
    btnOpen.addEventListener("click", () => modalOverlay.classList.add("open"));
    btnClose.addEventListener("click", () => modalOverlay.classList.remove("open"));
    modalOverlay.addEventListener("click", (e) => { if (e.target === modalOverlay) modalOverlay.classList.remove("open"); });
  }

  try {
    const phoneInput = document.getElementById("modalPhone");
    if(phoneInput && window.intlTelInput) {
      const iti = window.intlTelInput(phoneInput, {
        initialCountry: "br",
        preferredCountries: ["br", "us", "ar", "mx"],
        utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js",
      });

      phoneInput.addEventListener('input', function(e) {
        const country = iti.getSelectedCountryData().iso2;
        if (country === "br") {
          let x = e.target.value.replace(/\D/g, ''); 
          if(x.length === 0) { e.target.value = ''; return; }
          if(x.length <= 2) { e.target.value = '(' + x; return; }
          if(x.length <= 6) { e.target.value = '(' + x.slice(0,2) + ') ' + x.slice(2); return; }
          if(x.length <= 10) { e.target.value = '(' + x.slice(0,2) + ') ' + x.slice(2,6) + '-' + x.slice(6); return; }
          e.target.value = '(' + x.slice(0,2) + ') ' + x.slice(2,7) + '-' + x.slice(7,11);
        }
      });

      document.getElementById('contactFormModal').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!window.PA || !PA.configured) return alert("Erro de conexão.");

        const btn = e.target.querySelector('button[type="submit"]');
        const originalBtnHTML = btn.innerHTML;
        btn.innerHTML = "ENVIANDO...";
        btn.disabled = true;

        const fullPhoneNumber = iti.getNumber();

        const leadData = {
          name: document.getElementById('modalName').value.trim(),
          email: document.getElementById('modalEmail').value.trim(),
          phone: fullPhoneNumber,
          subject: document.getElementById('modalSubject').value,
          aircraft: document.getElementById('modalAircraftSelect').value,
          message: document.getElementById('modalMessage').value.trim(),
          status: "novo", 
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        try {
          await PA.db.collection("leads").add(leadData);
          alert('Sua mensagem foi enviada com sucesso!');
          e.target.reset();
          modalOverlay.classList.remove("open"); 
        } catch(err) {
          alert('Erro ao enviar: ' + err.message);
        } finally {
          btn.innerHTML = originalBtnHTML;
          btn.disabled = false;
        }
      });
    }
  } catch (error) {
    console.warn(error);
  }

  const btnPdf = document.getElementById("btnDownloadPDF");
  if(btnPdf) {
    btnPdf.addEventListener("click", async () => {
      if(!P) return;
      const originalText = btnPdf.innerHTML;
      btnPdf.innerHTML = "GERANDO PDF...";
      btnPdf.disabled = true;
      try {
        await generatePDF(P);
      } catch (err) {
        console.error(err);
        alert("Erro ao gerar PDF: " + err.message);
      } finally {
        btnPdf.innerHTML = originalText;
        btnPdf.disabled = false;
      }
    });
  }

  /* ============================================================
     GERAÇÃO DE PDF — independente de dispositivo.

     Estratégia: em vez de passar HTML puro pro html2pdf
     (que usa o viewport do celular para calcular larguras),
     injetamos um container real no DOM com largura fixa de
     794px, posicionado fora da tela. O html2canvas fotografa
     esse elemento real — sempre 794px, sempre igual, seja num
     iPhone ou num monitor 4K. Depois removemos o container.

     Imagens são convertidas para base64 antes de renderizar
     para eliminar problemas de CORS em qualquer dispositivo.
     ============================================================ */
  async function imgToBase64(url) {
    try {
      const res = await fetch(url);
      const blob = await res.blob();
      return await new Promise((ok, fail) => {
        const r = new FileReader();
        r.onload = () => ok(r.result);
        r.onerror = fail;
        r.readAsDataURL(blob);
      });
    } catch(e) {
      return url;
    }
  }

  async function generatePDF(p) {
    const logoSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 459.95"><g>
      <path fill="#000" d="M61.85,395.81l-12.03,60.13H0l37.8-188.41h84.18c12.03,0,22.19,1.77,30.5,5.3,8.3,3.54,14.79,8.31,19.47,14.32,4.67,6.02,7.73,12.93,9.16,20.76,1.43,7.83,1.29,16.03-.43,24.62-1.72,8.59-4.82,16.71-9.31,24.34-4.49,7.64-10.31,14.32-17.47,20.04-7.16,5.73-15.56,10.3-25.2,13.74-9.64,3.43-20.47,5.15-32.5,5.15h-34.36ZM78.46,313.34l-7.73,38.66h34.36c6.68,0,12.5-1.58,17.47-4.73,4.96-3.15,8.11-8.06,9.45-14.75,1.53-6.68.38-11.55-3.44-14.6-3.82-3.05-9.07-4.58-15.75-4.58h-34.36Z"/>
      <path fill="#000" d="M277.71,455.94h-109.6l37.8-188.41h49.82l-28.63,142.59h59.78l-9.16,45.81Z"/>
      <path fill="#000" d="M383.9,267.53h55.83l32.36,188.41h-50.68l-5.15-30.06h-67.29l-17.18,30.06h-55.83l107.95-188.41ZM371.88,385.79h37.8l-6.3-62.13h-.57l-30.92,62.13Z"/>
      <path fill="#000" d="M509.92,267.53h51.25l54.12,106.23l21.19-106.23h50.39l-37.51,188.41h-48.68l-55.26-114.53-23.19,114.53h-50.11l37.8-188.41Z"/>
      <path fill="#000" d="M813.77,455.94h-145.45l37.8-188.41h144.02l-8.88,44.67h-94.49l-5.44,27.77h90.19l-8.59,42.95h-90.2l-5.73,28.34h95.64l-8.88,44.67Z"/>
      <path fill="#000" d="M945.52,267.53h19.76l39.51,188.41h-17.75l-9.16-44.95h-99.93l-27.77,44.95h-19.76l115.1-188.41ZM887.96,394.66h86.47l-22.05-105.37h-.28l-64.14,105.37Z"/>
      <path fill="#000" d="M1005.87,267.53h17.75l27.49,165.5h.57l93.63-165.5h19.75l-106.51,188.41h-20.9l-31.79-188.41Z"/>
      <path fill="#000" d="M1162.35,455.94h-17.75l37.8-188.41h17.75l-37.8,188.41Z"/>
      <path fill="#000" d="M1292.6,267.53h19.76l39.52,188.41h-17.75l-9.16-44.95h-99.93l-27.77,44.95h-19.76l115.1-188.41ZM1235.05,394.66h86.47l-22.05-105.37h-.29l-64.13,105.37Z"/>
      <path fill="#000" d="M1487.79,283.85h-61.56l-34.64,172.09h-17.47l34.36-172.09h-62.42l3.43-16.32h141.74l-3.44,16.32Z"/>
      <path fill="#000" d="M1491.97,455.94h-17.75l37.79-188.41h17.75l-37.8,188.41Z"/>
      <path fill="#000" d="M1538.81,362.02c2.67-13.55,7.78-26.29,15.32-38.22,7.54-11.93,16.61-22.34,27.2-31.21,10.59-8.88,22.28-15.89,35.07-21.04,12.79-5.16,25.87-7.73,39.23-7.73s25.39,2.57,36.08,7.73c10.69,5.15,19.56,12.17,26.63,21.04,7.06,8.88,11.93,19.28,14.61,31.21,2.67,11.93,2.67,24.67,0,38.22-2.68,13.36-7.74,26.01-15.18,37.94-7.45,11.93-16.46,22.33-27.05,31.21-10.59,8.88-22.29,15.89-35.08,21.04-12.79,5.15-25.87,7.73-39.23,7.73s-25.39-2.58-36.07-7.73c-10.69-5.15-19.57-12.17-26.63-21.04-7.06-8.88-11.98-19.28-14.74-31.21-2.77-11.93-2.82-24.57-.14-37.94Z"/>
      <path fill="#000" d="M1772.25,267.53h18.33l79.59,161.21l32.36-161.21h17.47l-37.51,188.41h-18.32l-79.6-161.49-32.35,161.49h-17.75l37.79-188.41Z"/>
      </g>
      <path fill="#dc0000" d="M351.95,0s18.82,44.01,60.49,140.68c37.7,87.45,97.97,93.92,121.87,93.92h331.66c9.55,0,9.68-13.01,0-13.01-155.54,0-252.24-84.42-305.59-169.47C541.9,22.67,502.22,0,469.15,0c-122.93,0-117.2,0-117.2,0h0Z"/>
    </svg>`;
    const logoDataUri = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(logoSvg);

    const images = p.images && p.images.length ? p.images : [];
    const b64Images = await Promise.all(images.map(u => imgToBase64(u)));

    const priceStr = fmtPrice(p) || "Sob Consulta";
    const metaParts = [p.condition, p.year ? String(p.year) : null, p.codigoInterno ? "Cód: " + p.codigoInterno : null].filter(Boolean);

    const validSpecs = (p.specs || []).filter(s => s[0] || s[1]);
    const specsHTML = validSpecs.length ? `
      <div style="margin-bottom:22px">
        <h3 style="font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:#000;border-bottom:2px solid #eee;padding-bottom:5px;margin-bottom:10px;font-weight:700">Ficha Técnica</h3>
        <table style="width:100%;border-collapse:collapse">
          ${validSpecs.map((s,i) => `
          <tr style="background:${i%2===0?'#fafafa':'#fff'}">
            <td style="padding:5px 8px;font-size:11px;color:#555;width:50%;border-bottom:1px solid #f0f0f0">${s[0]||""}</td>
            <td style="padding:5px 8px;font-size:11px;font-weight:700;color:#000;border-bottom:1px solid #f0f0f0">${s[1]||""}</td>
          </tr>`).join("")}
        </table>
      </div>` : "";

    const descHTML = p.description ? `
      <div style="margin-bottom:22px">
        <h3 style="font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:#000;border-bottom:2px solid #eee;padding-bottom:5px;margin-bottom:10px;font-weight:700">Sobre a aeronave</h3>
        <p style="font-size:11px;line-height:1.65;color:#444;margin:0">${p.description}</p>
      </div>` : "";

    const horasItems = [
      p.hoursNum    ? {label:"Célula", val:fmtHoras(p.hoursNum)}    : null,
      p.motorHours  ? {label:"Motor",  val:fmtHoras(p.motorHours)}  : null,
      p.heliceHours ? {label:"Hélice", val:fmtHoras(p.heliceHours)} : null,
    ].filter(Boolean);
    const horasHTML = horasItems.length ? `
      <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap">
        ${horasItems.map(h=>`
          <div style="background:#f7f7f7;border:1px solid #eee;padding:8px 14px;border-radius:6px;font-size:11px">
            <span style="color:#555">${h.label}:</span>&nbsp;<b style="color:#000">${h.val}</b>
          </div>`).join("")}
      </div>` : "";

    const mainImgHTML = b64Images[0] ? `
      <div style="width:100%;height:310px;border-radius:10px;margin-bottom:18px;border:1px solid #e8e8e8;overflow:hidden">
        <img src="${b64Images[0]}" style="width:100%;height:100%;object-fit:cover;display:block">
      </div>` : "";

    const footer = `
      <div style="text-align:center;border-top:1px solid #eee;padding-top:12px;margin-top:24px">
        <p style="font-size:10px;margin:0;color:#666"><b>Plane Aviation</b> — Ficha de Apresentação Comercial | contato@planeaviation.com.br</p>
      </div>`;

    /* --- Monta o HTML das páginas com width:714px (794px menos 40px de cada lado) --- */
    const page1Inner = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid #d32f2f">
        <img src="${logoDataUri}" style="height:36px" alt="Plane Aviation">
        <span style="font-size:10px;color:#888;letter-spacing:.1em;text-transform:uppercase">Ficha Comercial</span>
      </div>
      ${mainImgHTML}
      <div style="margin-bottom:18px">
        <div style="font-size:10px;color:#888;letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px">${metaParts.join(" · ")}</div>
        <div style="font-size:30px;font-style:italic;text-transform:uppercase;color:#000;font-weight:800;line-height:1;margin-bottom:6px">${p.model}</div>
        <div style="font-size:20px;font-weight:700;color:#d32f2f">${priceStr}</div>
      </div>
      ${horasHTML}
      ${specsHTML}
      ${descHTML}
      ${footer}`;

    let page2Inner = "";
    if (b64Images.length > 1) {
      const cols = b64Images.length === 2 ? 1 : 2;
      const imgW = cols === 1 ? "100%" : "calc(50% - 8px)";
      const mosaic = b64Images.slice(1).map(src => `
        <div style="width:${imgW};height:220px;border-radius:8px;overflow:hidden;border:1px solid #e8e8e8;display:inline-block;vertical-align:top">
          <img src="${src}" style="width:100%;height:100%;object-fit:cover;display:block">
        </div>`).join("");
      page2Inner = `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;padding-bottom:14px;border-bottom:2px solid #d32f2f">
          <img src="${logoDataUri}" style="height:36px" alt="Plane Aviation">
          <span style="font-size:10px;color:#888;letter-spacing:.1em;text-transform:uppercase">${p.model} — Galeria</span>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:16px">${mosaic}</div>
        ${footer}`;
    }

    /* --- Container pai: posicionado fora da tela, largura fixa 794px ---
       Isso garante que o html2canvas sempre fotografia 794px de conteúdo,
       independente do viewport (desktop ou mobile). */
    const PDF_W = 794;
    const PDF_PAD = 40;

    function makePage(innerHTML) {
      const page = document.createElement("div");
      page.style.cssText = `
        width:${PDF_W}px; min-height:1123px; padding:${PDF_PAD}px;
        background:#fff; color:#1a1a1a;
        font-family:Arial,Helvetica,sans-serif;
        box-sizing:border-box; overflow:hidden;`;
      page.innerHTML = innerHTML;
      return page;
    }

    const wrapper = document.createElement("div");
    wrapper.style.cssText = `
      position:fixed; left:-9999px; top:0;
      width:${PDF_W}px; background:#fff;
      font-family:Arial,Helvetica,sans-serif;`;
    document.body.appendChild(wrapper);

    const pg1 = makePage(page1Inner);
    wrapper.appendChild(pg1);

    // Aguarda imagens renderizarem
    await new Promise(r => setTimeout(r, 300));

    const opt = {
      margin:      0,
      filename:    `Plane-Aviation-${p.model.replace(/\s+/g,"-")}.pdf`,
      image:       { type: "jpeg", quality: 0.97 },
      html2canvas: { scale: 2, useCORS: true, allowTaint: true, backgroundColor: "#ffffff", logging: false },
      jsPDF:       { unit: "mm", format: "a4", orientation: "portrait" }
    };

    const pdf = html2pdf().set(opt);

    if (page2Inner) {
      const pg2 = makePage(page2Inner);
      // Gera as duas páginas separadas e as une
      const canvas1 = await html2pdf().set(opt).from(pg1).outputImg();
      const pg2el   = makePage(page2Inner);
      wrapper.appendChild(pg2el);
      await new Promise(r => setTimeout(r, 200));
      await html2pdf().set({...opt, filename: `Plane-Aviation-${p.model.replace(/\s+/g,"-")}.pdf`})
        .from(wrapper).save();
    } else {
      await html2pdf().set(opt).from(pg1).save();
    }

    document.body.removeChild(wrapper);
  }

  init();
});
</script>
</body>
