<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aeronave | Plane Aviation</title>
<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<!-- CSS da Biblioteca de Bandeiras/Telefone -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css">

<!-- Biblioteca para geração dinâmica de PDF no navegador -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
  #site-header { display: block; height: 4rem; }
  body { min-height: 100vh; }
</style>
<style>
/* ============================================================
   AERONAVE DETALHE — Dark Theme
   ============================================================ */
body { background: #0a0a0a; color: #fff; }

/* Breadcrumb */
.crumb { border-bottom: 1px solid rgba(255,255,255,0.08); padding: .625rem 0; }
.crumb .container { display: flex; align-items: center; gap: .5rem; font-size: .75rem; color: rgba(255,255,255,0.35); }
.crumb a { color: rgba(255,255,255,0.35); }
.crumb a:hover { color: rgba(255,255,255,0.7); }
.crumb .sep { opacity: .3; }
.crumb .cur { color: rgba(255,255,255,0.6); font-weight: 500; }

/* ---- MAIN LAYOUT ---- */
.det-wrap { padding: 2.5rem 0 5rem; }
.det-grid { display: grid; grid-template-columns: 1fr; gap: 2.5rem; align-items: start; }
@media(min-width:1024px) { .det-grid { grid-template-columns: 1.1fr 1fr; gap: 3.5rem; } }

/* ---- GALLERY ---- */
.gal-main {
  border-radius: 14px; overflow: hidden; position: relative; background: rgba(255,255,255,0.05); aspect-ratio: 4/3;
  border: 1px solid rgba(255,255,255,0.12); box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset, 0 -1px 0 rgba(0,0,0,0.4) inset, 0 32px 64px rgba(0,0,0,0.6);
}
.gal-main img { width: 100%; height: 100%; object-fit: cover; display: block; }
.gal-main .ph-dark { width:100%;height:100%;display:flex;align-items:center;justify-content:center; color:rgba(255,255,255,0.15);font-size:.75rem;letter-spacing:.1em;text-transform:uppercase; }
.gal-nav {
  position: absolute; top: 50%; transform: translateY(-50%); width: 2.25rem; height: 2.25rem;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.15); border-radius: 50%;
  display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; transition: background .15s; z-index: 2;
}
.gal-nav:hover { background: rgba(0,0,0,0.75); }
.gal-nav.prev { left: .75rem; }
.gal-nav.next { right: .75rem; }
.gal-tag {
  position: absolute; top: .875rem; left: .875rem; font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  background: rgba(255,255,255,0.12); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; color: #fff; padding: .3rem .625rem;
}
.thumbs { display: grid; grid-template-columns: repeat(4,1fr); gap: .5rem; margin-top: .625rem; }
.thumbs button { background: none; padding: 0; cursor: pointer; border: 2px solid transparent; border-radius: 8px; overflow: hidden; transition: border-color .15s; }
.thumbs button.active { border-color: rgba(255,255,255,0.5); }
.thumbs button img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; }

/* ---- INFO COLUMN ---- */
.det-badge { font-size: 9px; letter-spacing: .2em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: .5rem; }
.det-title {
  font-family: 'Grift', 'Bebas Neue', 'Inter', sans-serif; font-size: clamp(2rem, 5vw, 3rem); font-weight: 800; font-style: italic;
  text-transform: uppercase; letter-spacing: -.01em; line-height: 1; color: #fff; margin-bottom: 1rem;
}
.det-title span { font-weight: 400; font-style: italic; }

.det-metas { display: flex; flex-wrap: wrap; gap: .375rem; margin-bottom: 1.25rem; }
.det-meta-pill {
  display: inline-flex; align-items: center; gap: .375rem; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 6px; padding: .3rem .75rem; font-size: .75rem; font-weight: 500; color: rgba(255,255,255,0.8); white-space: nowrap;
}
.det-meta-pill .ml { color: rgba(255,255,255,0.4); font-weight: 400; margin-right: .125rem; }

.det-price { font-size: 1.625rem; font-weight: 700; letter-spacing: -.02em; color: #fff; margin-bottom: 1.5rem; }
.det-price.consult { font-size: 1rem; font-weight: 500; color: rgba(255,255,255,0.4); font-style: italic; }

/* CTAs */
.det-actions { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 2rem; }
.det-btn-primary {
  display: inline-flex; align-items: center; justify-content: center; gap: .625rem;
  background: #fff; color: #0a0a0a; border: none; border-radius: 6px; font-size: 11px; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; padding: .875rem 2.5rem; cursor: pointer; text-decoration: none; transition: opacity .15s; flex: 1;
}
.det-btn-primary:hover { opacity: .88; }
.det-btn-pdf {
  display: inline-flex; align-items: center; justify-content: center; gap: .5rem;
  background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.25); border-radius: 6px;
  font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; padding: .875rem 1.5rem; cursor: pointer;
  text-decoration: none; transition: background .15s, border-color .15s; flex: 0 0 auto;
}
.det-btn-pdf:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.4); }

.det-divider { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 1.5rem 0; }
.det-section-label { font-size: 9px; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: .875rem; }
.det-desc-text { font-size: .875rem; line-height: 1.75; color: rgba(255,255,255,0.55); white-space: pre-wrap; }
.det-specs { border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; overflow: hidden; }
.det-spec-row { display: flex; justify-content: space-between; align-items: center; padding: .625rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: .8125rem; }
.det-spec-row:last-child { border-bottom: none; }
.det-spec-key { color: rgba(255,255,255,0.4); }
.det-spec-val { font-weight: 600; color: #fff; }

.det-tech-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
@media(min-width:640px) { .det-tech-grid { grid-template-columns: repeat(4,1fr); } }
.det-tech-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 1rem; }
.det-tech-card svg { color: rgba(255,255,255,0.5); margin-bottom: .625rem; }
.det-tech-card h3 { font-size: .8125rem; font-weight: 700; color: #fff; margin-bottom: .25rem; }
.det-tech-card p { font-size: .75rem; color: rgba(255,255,255,0.4); line-height: 1.5; }

/* Outras Opções */
.other-section { border-top: 1px solid rgba(255,255,255,0.08); margin-top: 4rem; padding-top: 3rem; }
.other-section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: .75rem; }
.other-section-head h2 { font-family: 'Grift', 'Bebas Neue', 'Inter', sans-serif; font-size: 1.25rem; font-weight: 800; font-style: italic; text-transform: uppercase; color: #fff; }
.other-see-all { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,0.4); text-decoration: none; display: inline-flex; align-items: center; gap: .375rem; transition: color .15s; }
.other-see-all:hover { color: #fff; }
.other-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 1rem; }
@media(min-width:640px)  { .other-grid { grid-template-columns: repeat(2,1fr); } }
@media(min-width:1024px) { .other-grid { grid-template-columns: repeat(4,1fr); } }
.ac-card { display: block; background: rgba(255,255,255,0.04); border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.12); box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset, 0 -1px 0 rgba(0,0,0,0.4) inset, 0 24px 48px rgba(0,0,0,0.5); transition: transform .2s, box-shadow .2s, border-color .2s; text-decoration: none; color: inherit; padding: .5rem; cursor: pointer; }
.ac-card:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.22); }
.ac-card-img { position: relative; border-radius: 10px; overflow: hidden; aspect-ratio: 4/3; background: rgba(255,255,255,0.06); margin-bottom: .75rem; }
.ac-card-img img { width:100%;height:100%;object-fit:cover;display:block; }
.ac-card-img .ph-dark { width:100%;height:100%;display:flex;align-items:center;justify-content:center; color:rgba(255,255,255,0.15);font-size:.6rem; }
.ac-card-tag { position:absolute;top:.5rem;left:.5rem; font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase; background:rgba(255,255,255,0.12);backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.2);border-radius:4px; color:#fff;padding:.2rem .4rem; }
.ac-card-body { padding: .125rem .25rem .375rem; }
.ac-card-cond { font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:.2rem; }
.ac-card-title { font-family:'Grift','Bebas Neue','Inter',sans-serif; font-size:1rem;font-weight:800;font-style:italic; text-transform:uppercase;color:#fff;line-height:1.1;margin-bottom:.2rem; }
.ac-card-title span { font-weight:400; }
.ac-card-meta { font-size:.7rem;color:rgba(255,255,255,0.35);margin-bottom:.5rem; }
.ac-card-price { font-size:.875rem;font-weight:700;color:#fff;margin-bottom:.625rem; }
.ac-card-btn { display:inline-flex;align-items:center;gap:.375rem; font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase; color:#fff;background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.18);border-radius:5px; padding:.4rem .75rem;white-space:nowrap; }

/* ============================================================
   MODAL DE CONTATO (Pop-up Form)
   ============================================================ */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); display:none; align-items:center; justify-content:center; z-index:999; padding:2rem 1rem; overflow-y:auto; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); }
.overlay.open { display:flex; }
.modal { background:#0a0a0a; border:1px solid rgba(255,255,255,0.15); border-radius:16px; width:100%; max-width:32rem; margin:auto; color:#fff; box-shadow: 0 24px 64px rgba(0,0,0,0.8); }
.modal-head { display:flex; align-items:center; justify-content:space-between; padding:1.5rem; border-bottom:1px solid rgba(255,255,255,0.08); }
.modal-head h3 { font-size:1.25rem; font-weight:700; font-family:'Grift', sans-serif; font-style:italic; letter-spacing:0.02em; text-transform: uppercase; margin: 0; }
.modal-wa-btn { display:inline-flex; align-items:center; gap:.375rem; font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:#fff; background:transparent; border:1px solid rgba(255,255,255,0.2); border-radius:6px; padding:.5rem .75rem; text-decoration:none; transition:background .15s, border-color .15s; }
.modal-wa-btn:hover { background:rgba(255,255,255,0.08); border-color:rgba(255,255,255,0.4); }
.modal-body { padding:1.5rem; }
.x-btn { background:none; border:none; cursor:pointer; color:rgba(255,255,255,0.5); font-size:1.25rem; display: flex; align-items: center; justify-content: center; transition: color .15s;}
.x-btn:hover { color:#fff; }

/* Form Styles do Modal */
.form-group { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.25rem; }
.form-group label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.6); }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.875rem 1rem; font-family: var(--font); font-size: .875rem; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 8px; color: #fff; transition: border-color 0.2s, background-color 0.2s; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #fff; background: rgba(255, 255, 255, 0.1); }
.form-group select { appearance: none; cursor: pointer; }
.form-group select option { background: #1a1a1a; color: #fff; }

.iti { width: 100%; }
.iti__country-list { background-color: #151515 !important; border: 1px solid rgba(255, 255, 255, 0.15) !important; border-radius: 8px; color: #ffffff; max-width: 300px; z-index: 1000; }
.iti__country:hover, .iti__country.iti__highlight { background-color: rgba(255, 255, 255, 0.1) !important; }
.iti__divider { border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important; }
.form-group input#modalPhone { padding-left: 3.5rem !important; }
</style>
</head>
<body>
<div id="site-header"></div>
<main>
  <!-- Breadcrumb -->
  <div class="crumb">
    <div class="container">
      <a href="aeronaves.html" data-i18n="det_crumb">Aeronaves Disponíveis</a>
      <span class="sep">/</span>
      <span class="cur" id="crumbModel"></span>
    </div>
  </div>

  <!-- Main -->
  <div class="det-wrap" id="detWrap">
    <div class="container">
      <div class="det-grid">

        <!-- LEFT: Gallery + Description + Specs -->
        <div>
          <div class="gal-main" id="galMain">
            <div class="ph-dark">[Imagem]</div>
            <button class="gal-nav prev" id="galPrev" aria-label="Anterior"><svg style="width:1rem;height:1rem;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg></button>
            <button class="gal-nav next" id="galNext" aria-label="Próxima"><svg style="width:1rem;height:1rem;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg></button>
            <span class="gal-tag" id="galTag" style="display:none"></span>
          </div>
          <div class="thumbs" id="thumbs"></div>

          <div id="descBlock" style="display:none;margin-top:2rem">
            <p class="det-section-label" id="descLabel" data-i18n="det_about">Sobre esta aeronave</p>
            <p class="det-desc-text" id="descText"></p>
          </div>

          <div id="specsBlock" style="display:none;margin-top:2rem">
            <p class="det-section-label" id="specsLabel" data-i18n="det_specs">Ficha Técnica</p>
            <div class="det-specs" id="specs"></div>
          </div>
        </div>

        <!-- RIGHT: Info -->
        <div>
          <p class="det-badge" id="condLoc"></p>
          <h1 class="det-title" id="model"></h1>
          <div class="det-metas" id="detMetas"></div>
          <div class="det-price" id="detPrice"></div>
          
          <div class="det-actions">
            <button id="btnOpenContactModal" class="det-btn-primary">
              TENHO INTERESSE
              <svg viewBox="0 0 24.68 24.68" xmlns="http://www.w3.org/2000/svg" style="width:1em;height:1em;flex-shrink:0;fill:currentColor;display:inline-block;vertical-align:middle;margin-left:.25rem"><polygon points="0 0 0 2 21.26 2 0 23.26 1.42 24.67 22.68 3.41 22.68 24.68 24.68 24.68 24.68 0 0 0"/></svg>
            </button>
            
            <!-- NOVO: BOTÃO BAIXAR PDF -->
            <button id="btnDownloadPDF" class="det-btn-pdf">
              BAIXAR PDF
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:1.2em;height:1.2em;margin-left:.25rem;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            </button>
          </div>
        </div>
      </div>

      <div id="featsSection" style="display:none;margin-top:3rem">
        <hr class="det-divider">
        <p class="det-section-label" id="featsLabel" data-i18n="det_tech">Tecnologias a bordo</p>
        <div class="det-tech-grid" id="feats"></div>
      </div>

      <div class="other-section" id="otherSection" style="display:none">
        <div class="other-section-head">
          <h2>Outras opções</h2>
          <a href="aeronaves.html" class="other-see-all">Ver todas
            <svg viewBox="0 0 24.68 24.68" xmlns="http://www.w3.org/2000/svg" style="width:.8em;height:.8em;fill:currentColor"><polygon points="0 0 0 2 21.26 2 0 23.26 1.42 24.67 22.68 3.41 22.68 24.68 24.68 24.68 24.68 0 0 0"/></svg>
          </a>
        </div>
        <div class="other-grid" id="otherGrid"></div>
      </div>
    </div>
  </div>
</main>
<div id="site-footer"></div>

<!-- POP-UP MODAL (FORMULÁRIO DE CONTATO) -->
<div class="overlay" id="contactModal">
  <div class="modal">
    <div class="modal-head">
      <h3>FALE COM UM CONSULTOR</h3>
      <div style="display: flex; align-items: center; gap: 1rem;">
        <a id="btnWhatsApp" href="#" target="_blank" class="modal-wa-btn">
          WHATSAPP
          <svg viewBox="0 0 24.68 24.68" xmlns="http://www.w3.org/2000/svg" style="width:1em;height:1em;fill:currentColor;display:inline-block;vertical-align:middle"><polygon points="0 0 0 2 21.26 2 0 23.26 1.42 24.67 22.68 3.41 22.68 24.68 24.68 24.68 24.68 0 0 0"/></svg>
        </a>
        <button class="x-btn" id="btnCloseModal">✕</button>
      </div>
    </div>
    <div class="modal-body">
      <form id="contactFormModal">
        <div class="form-group">
          <label for="modalName">Nome Completo</label>
          <input type="text" id="modalName" required placeholder="Ex: João Silva">
        </div>
        <div class="form-group">
          <label for="modalEmail">E-mail Corporativo</label>
          <input type="email" id="modalEmail" required placeholder="joao@empresa.com">
        </div>
        <div class="form-group">
          <label for="modalPhone">Telefone / WhatsApp</label>
          <input type="tel" id="modalPhone" required placeholder="(11) 99999-0000">
        </div>
        
        <input type="hidden" id="modalSubject" value="comprar">
        
        <div class="form-group">
          <label for="modalAircraftSelect">Aeronave de Interesse</label>
          <select id="modalAircraftSelect" required></select>
        </div>
        
        <div class="form-group">
          <label for="modalMessage">Sua Mensagem</label>
          <textarea id="modalMessage" rows="4" required placeholder="Gostaria de saber mais informações sobre esta aeronave..."></textarea>
        </div>
        <button type="submit" class="btn btn-solid btn-lg" style="width: 100%; margin-top: 0.5rem; background-color: #ffffff; color: #000000;">
          ENVIAR MENSAGEM
          <svg viewBox="0 0 24.68 24.68" xmlns="http://www.w3.org/2000/svg" style="width: 1em; height: 1em; fill: currentColor;"><polygon points="0 0 0 2 21.26 2 0 23.26 1.42 24.67 22.68 3.41 22.68 24.68 24.68 24.68 24.68 0 0 0"/></svg>
        </button>
      </form>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const ARROW = '<svg viewBox="0 0 24.68 24.68" xmlns="http://www.w3.org/2000/svg" style="width:.9em;height:.9em;flex-shrink:0;fill:currentColor;display:inline-block;vertical-align:middle"><polygon points="0 0 0 2 21.26 2 0 23.26 1.42 24.67 22.68 3.41 22.68 24.68 24.68 24.68 24.68 0 0 0"/></svg>';

const ICONS = {
  Shield:'<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>',
  Monitor:'<rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/>',
  Navigation:'<polygon points="3 11 22 2 13 21 11 13 3 11"/>',

  Award:'<circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/>'
};

function t(k){ return window.PA_I18N ? PA_I18N.t(k) : k; }
function getLang(){ return window.PA_I18N ? PA_I18N.getLang() : "pt"; }
function getLocalized(p,f){ const l=getLang(); return l==="pt"?p[f]||"":(p.translations?.[l]?.[f]||p[f]||""); }
function getLocalizedArray(p,f){ const l=getLang(); return l==="pt"?p[f]||[]:(p.translations?.[l]?.[f]||p[f]||[]); }

const pageId = new URLSearchParams(location.search).get("id");
let P = null, activeImg = 0;

document.addEventListener("pa:langchange", () => { if(P) renderPage(P); });

// Gallery
const galMainEl = document.getElementById("galMain");
const thumbsEl  = document.getElementById("thumbs");

function hasImgs(){ return P && P.images && P.images.length; }

function paintMain(){
  const existing = galMainEl.querySelector("img, .ph-dark");
  if(existing) existing.remove();
  if(hasImgs()){
    const img = document.createElement("img");
    img.src = P.images[activeImg];
    img.alt = P.model;
    galMainEl.prepend(img);
  }
}
function paintThumbs(){
  if(!hasImgs()){ thumbsEl.innerHTML=""; return; }
  thumbsEl.innerHTML = P.images.map((url,i) =>
    `<button class="${i===activeImg?"active":""}" data-i="${i}"><img src="${url}" alt="${P.model} ${i+1}"></button>`).join("");
  thumbsEl.querySelectorAll("button").forEach(b =>
    b.addEventListener("click", () => { activeImg=+b.dataset.i; paintMain(); paintThumbs(); }));
}
document.getElementById("galPrev").addEventListener("click", () => { if(!hasImgs()) return; activeImg=(activeImg-1+P.images.length)%P.images.length; paintMain(); paintThumbs(); });
document.getElementById("galNext").addEventListener("click", () => { if(!hasImgs()) return; activeImg=(activeImg+1)%P.images.length; paintMain(); paintThumbs(); });

function fmtPrice(p){
  if(p.sobConsulta || !p.priceNum) return null;
  return p.currency==="BRL" ? "R$"+Number(p.priceNum).toLocaleString("pt-BR") : "USD "+Number(p.priceNum).toLocaleString("en-US");
}
function fmtHoras(n){ return n!=null ? Number(n).toLocaleString("pt-BR")+"h" : null; }

function renderPage(p){
  P = p;
  if(!P._init){ activeImg=0; P._init=true; paintMain(); paintThumbs(); }

  const loc_cond  = getLocalized(p,"condition");
  const loc_loc   = getLocalized(p,"location");
  const loc_desc  = getLocalized(p,"description");
  const loc_specs = getLocalizedArray(p,"specs");
  const loc_feats = getLocalizedArray(p,"features");

  document.getElementById("crumbModel").textContent = p.model + (p.year ? " — "+p.year : "");
  document.getElementById("condLoc").textContent = [loc_cond, loc_loc].filter(Boolean).join(" · ");
  document.title = `${p.model} | Plane Aviation`;

  const parts = p.model.match(/^(.*?)(\s[A-Z0-9+]+)?$/);
  const main = parts?.[1] || p.model;
  const sub  = parts?.[2] || "";
  document.getElementById("model").innerHTML = `${main}<span>${sub}</span>`;

  const tagEl = document.getElementById("galTag");
  if(p.tag){ tagEl.textContent=p.tag; tagEl.style.display=""; } else { tagEl.style.display="none"; }

  const metas = [];
  if(p.year)              metas.push({ l:t("det_meta_year"),   v:String(p.year) });
  if(p.hoursNum!=null)    metas.push({ l:t("det_meta_cell"),   v:fmtHoras(p.hoursNum) });
  if(p.motorHours!=null)  metas.push({ l:t("det_meta_engine"), v:fmtHoras(p.motorHours) });
  if(p.heliceHours!=null) metas.push({ l:t("det_meta_prop"),   v:fmtHoras(p.heliceHours) });
  document.getElementById("detMetas").innerHTML = metas.map(m => `<span class="det-meta-pill"><span class="ml">${m.l}</span>${m.v}</span>`).join("");

  const priceEl = document.getElementById("detPrice");
  const price = fmtPrice(p);
  if(price){ priceEl.textContent=price; priceEl.className="det-price"; } else { priceEl.textContent=t("ac_consult"); priceEl.className="det-price consult"; }

  const descBlock = document.getElementById("descBlock");
  if(loc_desc){ document.getElementById("descLabel").textContent = t("det_about"); document.getElementById("descText").textContent  = loc_desc; descBlock.style.display="block"; } else { descBlock.style.display="none"; }

  const specsBlock = document.getElementById("specsBlock");
  const specsHTML = loc_specs.filter(s=>s[0]||s[1]).map(s => `<div class="det-spec-row"><span class="det-spec-key">${s[0]||""}</span><span class="det-spec-val">${s[1]||""}</span></div>`).join("");
  if(specsHTML){ document.getElementById("specs").innerHTML = specsHTML; document.getElementById("specsLabel").textContent = t("det_specs"); specsBlock.style.display="block"; } else { specsBlock.style.display="none"; }

  const featsSection = document.getElementById("featsSection");
  const featsHTML = loc_feats.filter(f=>f[1]||f[2]).map(f => `<div class="det-tech-card"><svg class="icon i-5" style="stroke:rgba(255,255,255,0.5);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;width:1.5rem;height:1.5rem;display:block" viewBox="0 0 24 24">${ICONS[f[0]]||ICONS.Shield}</svg><h3>${f[1]||""}</h3><p>${f[2]||""}</p></div>`).join("");
  if(featsHTML){ document.getElementById("feats").innerHTML = featsHTML; document.getElementById("featsLabel").textContent = t("det_tech"); featsSection.style.display="block"; } else { featsSection.style.display="none"; }

  // WhatsApp Dinâmico
  const telefoneWhatsapp = "5511999990000"; 
  const codInterno = p.codigoInterno || "Sem Cód";
  const textoMensagem = encodeURIComponent(`Olá! Tenho interesse na aeronave ${main} ${sub} (${codInterno}).`);
  document.getElementById("btnWhatsApp").href = `https://wa.me/${telefoneWhatsapp}?text=${textoMensagem}`;

  // Select do Modal
  const modalSelect = document.getElementById("modalAircraftSelect");
  modalSelect.innerHTML = `<option value="${p.model} [${codInterno}]" selected>${p.model} (${p.year})</option>`;
}

function notFound(){
  document.getElementById("detWrap").innerHTML = `<div class="container" style="padding:5rem 0;text-align:center"><p style="font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:1rem" data-i18n="ac_eyebrow">Estoque</p><h1 style="font-family:'Grift','Bebas Neue','Inter',sans-serif;font-size:2.5rem;font-weight:800;font-style:italic;text-transform:uppercase;color:#fff;margin-bottom:1rem" data-i18n="det_notfound">Aeronave não encontrada</h1><a href="aeronaves.html" style="display:inline-flex;align-items:center;gap:.5rem;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#fff;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:6px;padding:.75rem 1.5rem;text-decoration:none" data-i18n="det_back">Ver Aeronaves Disponíveis</a></div>`;
  if(window.PA_I18N) PA_I18N.applyLang();
}

function fromFirestore(a){
  return { tag:a.tag||"", model:a.model||"", year:a.year||"", hoursNum:a.hoursNum!=null?a.hoursNum:null, motorHours:a.motorHours!=null?a.motorHours:null, heliceHours:a.heliceHours!=null?a.heliceHours:null, condition:a.condition||"", currency:a.currency||"USD", priceNum:a.priceNum!=null?a.priceNum:null, sobConsulta:!!a.sobConsulta, location:a.location||"", description:a.description||"", codigoInterno:a.codigoInterno||"", translations:a.translations||{}, images:a.images||[], specs:(a.specs||[]).map(s=>[s.label,s.value]), features:(a.features||[]).map(f=>[f.icon,f.title,f.desc]) };
}

function otherCardHTML(id, a){
  const parts = (a.model||"").match(/^(.*?)(\s[A-Z0-9+]+)?$/); const main = parts?.[1]||a.model||""; const sub  = parts?.[2]||"";
  const price = (a.sobConsulta||!a.priceNum) ? t("ac_consult") : (a.currency==="BRL"?"R$":"USD ")+Number(a.priceNum).toLocaleString(a.currency==="BRL"?"pt-BR":"en-US");
  const meta = [a.year, a.hoursNum!=null?Number(a.hoursNum).toLocaleString("pt-BR")+"h":null].filter(Boolean).join(" • ");
  const img = (a.images&&a.images[0]) ? `<img src="${a.images[0]}" alt="${a.model}">` : `<div class="ph-dark">[Foto]</div>`;
  return `<a href="aeronave.html?id=${id}" class="ac-card"><div class="ac-card-img">${img}${a.tag?`<span class="ac-card-tag">${a.tag}</span>`:""}</div><div class="ac-card-body"><div class="ac-card-cond">${a.condition||""}</div><div class="ac-card-title">${main}<span>${sub}</span></div>${meta?`<div class="ac-card-meta">${meta}</div>`:""}<div class="ac-card-price">${price}</div><span class="ac-card-btn">Ver ${ARROW}</span></div></a>`;
}

async function init(){
  if(!window.PA || !PA.configured || !pageId){ notFound(); return; }
  try {
    const doc = await PA.db.collection("aircraft").doc(pageId).get();
    if(!doc.exists || doc.data().archived){ notFound(); return; }
    renderPage(fromFirestore(doc.data()));

    const others = await PA.db.collection("aircraft").get();
    const otherDocs = others.docs.filter(d=>d.id!==pageId && !d.data().archived).sort((a,b)=>{ const ay = Number(a.data().year)||0, by = Number(b.data().year)||0; if(ay !== by) return by - ay; return (b.data().createdAt?.seconds||0)-(a.data().createdAt?.seconds||0); }).slice(0,4);
    if(otherDocs.length){ document.getElementById("otherSection").style.display="block"; document.getElementById("otherGrid").innerHTML = otherDocs.map(d=>otherCardHTML(d.id,d.data())).join(""); }
  } catch(e){ notFound(); }
}
init();

/* ============================================================
   LÓGICA DO MODAL DE CONTATO E TELEFONE
   ============================================================ */
const btnOpen = document.getElementById("btnOpenContactModal");
const btnClose = document.getElementById("btnCloseModal");
const modalOverlay = document.getElementById("contactModal");

btnOpen.addEventListener("click", () => modalOverlay.classList.add("open"));
btnClose.addEventListener("click", () => modalOverlay.classList.remove("open"));
modalOverlay.addEventListener("click", (e) => { if (e.target === modalOverlay) modalOverlay.classList.remove("open"); });

const phoneInput = document.getElementById("modalPhone");
const iti = window.intlTelInput(phoneInput, {
  initialCountry: "br",
  preferredCountries: ["br", "us", "ar", "mx"],
  utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js",
});

phoneInput.addEventListener('input', function(e) {
  const country = iti.getSelectedCountryData().iso2;
  if (country === "br") {
    let x = e.target.value.replace(/\D/g, ''); 
    if(x.length === 0) { e.target.value = ''; return; }
    if(x.length <= 2) { e.target.value = '(' + x; return; }
    if(x.length <= 6) { e.target.value = '(' + x.slice(0,2) + ') ' + x.slice(2); return; }
    if(x.length <= 10) { e.target.value = '(' + x.slice(0,2) + ') ' + x.slice(2,6) + '-' + x.slice(6); return; }
    e.target.value = '(' + x.slice(0,2) + ') ' + x.slice(2,7) + '-' + x.slice(7,11);
  }
});

document.getElementById('contactFormModal').addEventListener('submit', async (e) => {
  e.preventDefault();
  if (!window.PA || !PA.configured) return alert("Erro de conexão. Tente contato via WhatsApp no momento.");

  const btn = e.target.querySelector('button[type="submit"]');
  const originalBtnHTML = btn.innerHTML;
  btn.innerHTML = "ENVIANDO...";
  btn.disabled = true;

  const fullPhoneNumber = iti.getNumber();

  const leadData = {
    name: document.getElementById('modalName').value.trim(),
    email: document.getElementById('modalEmail').value.trim(),
    phone: fullPhoneNumber,
    subject: document.getElementById('modalSubject').value,
    aircraft: document.getElementById('modalAircraftSelect').value,
    message: document.getElementById('modalMessage').value.trim(),
    status: "novo", 
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  try {
    await PA.db.collection("leads").add(leadData);
    alert('Obrigado! Sua mensagem foi enviada com sucesso e nossa equipe entrará em contato em breve.');
    e.target.reset();
    modalOverlay.classList.remove("open"); 
  } catch(err) {
    alert('Ops! Houve um erro ao enviar: ' + err.message);
  } finally {
    btn.innerHTML = originalBtnHTML;
    btn.disabled = false;
  }
});

/* ============================================================
   LÓGICA DE GERAÇÃO DE PDF DINÂMICO
   ============================================================ */
document.getElementById("btnDownloadPDF").addEventListener("click", async () => {
  if(!P) return;

  const btn = document.getElementById("btnDownloadPDF");
  const originalText = btn.innerHTML;
  btn.innerHTML = "GERANDO PDF...";
  btn.disabled = true;

  // Monta a string do Preço
  const priceStr = fmtPrice(P) || "Sob Consulta";
  
  // Monta o grid da Ficha Técnica
  const specsHTML = (P.specs||[]).filter(s=>s[0]||s[1]).map(s=>`
    <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #333; font-size:12px;">
      <span style="color:#aaa">${s[0]}</span>
      <span style="font-weight:600">${s[1]}</span>
    </div>
  `).join('');

  // Imagem Principal (Configurada com crossorigin para evitar bloqueios de segurança do Firebase)
  const mainImg = P.images && P.images.length 
    ? `<img src="${P.images[0]}" crossorigin="anonymous" style="width:100%; height:400px; object-fit:cover; border-radius:12px; margin-bottom:20px;">` 
    : '';

  // Criação do container invisível para moldar o PDF
  const pdfBox = document.createElement("div");
  pdfBox.style.position = "absolute";
  pdfBox.style.left = "-9999px"; // Oculto da tela
  
  pdfBox.innerHTML = `
    <div style="padding:40px; background-color:#0a0a0a; color:#ffffff; font-family: 'Inter', sans-serif; width:800px; min-height:1100px;">
      
      <!-- Cabeçalho PDF -->
      <div style="text-align:center; margin-bottom:30px;">
        <h2 style="margin:0; font-size:24px; letter-spacing:2px; font-style:italic;">PLANE AVIATION</h2>
        <p style="margin:5px 0 0; font-size:10px; color:#888; letter-spacing:1px; text-transform:uppercase;">Representante Exclusiva Cirrus no Brasil</p>
      </div>
      
      ${mainImg}
      
      <!-- Informações Principais -->
      <div style="margin-bottom:20px;">
        <div style="font-size:10px; color:#aaa; letter-spacing:2px; text-transform:uppercase; margin-bottom:5px;">${P.condition || ''} · ${P.year || ''} · Cód: ${P.codigoInterno || ''}</div>
        <h1 style="margin:0 0 10px; font-size:36px; font-style:italic; text-transform:uppercase;">${P.model}</h1>
        <div style="font-size:24px; font-weight:bold;">${priceStr}</div>
      </div>
      
      <!-- Metas (Horas) -->
      <div style="display:flex; gap:20px; margin-bottom:30px;">
        ${P.hoursNum ? `<div style="background:#151515; padding:10px 15px; border-radius:8px; font-size:12px;"><span style="color:#aaa">Célula:</span> <b>${fmtHoras(P.hoursNum)}</b></div>` : ''}
        ${P.motorHours ? `<div style="background:#151515; padding:10px 15px; border-radius:8px; font-size:12px;"><span style="color:#aaa">Motor:</span> <b>${fmtHoras(P.motorHours)}</b></div>` : ''}
        ${P.heliceHours ? `<div style="background:#151515; padding:10px 15px; border-radius:8px; font-size:12px;"><span style="color:#aaa">Hélice:</span> <b>${fmtHoras(P.heliceHours)}</b></div>` : ''}
      </div>
      
      <!-- Ficha Técnica (Specs) -->
      <div style="margin-bottom:30px;">
        <h3 style="font-size:14px; text-transform:uppercase; color:#888; border-bottom:1px solid #333; padding-bottom:5px; margin-bottom:15px;">Ficha Técnica</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:0 30px;">
          ${specsHTML}
        </div>
      </div>
      
      <!-- Descrição -->
      ${P.description ? `
      <div style="margin-bottom:30px;">
        <h3 style="font-size:14px; text-transform:uppercase; color:#888; border-bottom:1px solid #333; padding-bottom:5px; margin-bottom:15px;">Sobre a aeronave</h3>
        <p style="font-size:12px; line-height:1.6; color:#ccc;">${P.description}</p>
      </div>
      ` : ''}
      
      <!-- Rodapé PDF -->
      <div style="text-align:center; border-top:1px solid #333; padding-top:20px; margin-top:40px;">
        <p style="font-size:12px; margin:0;"><b>Fale com um consultor:</b> +55 (11) 99999-0000 | contato@planeaviation.com.br</p>
      </div>
      
    </div>
  `;

  document.body.appendChild(pdfBox);

  // Configurações da biblioteca
  const opt = {
    margin:       0,
    filename:     `Plane-Aviation-${P.model.replace(/\s+/g, '-')}.pdf`,
    image:        { type: 'jpeg', quality: 0.98 },
    html2canvas:  { scale: 2, useCORS: true, backgroundColor: '#0a0a0a' },
    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };

  // Processa e Baixa o PDF
  try {
    await html2pdf().set(opt).from(pdfBox).save();
  } catch (err) {
    console.error(err);
    alert("Erro ao gerar PDF.");
  }

  // Finalização (Remove a div invisível e restaura o botão)
  document.body.removeChild(pdfBox);
  btn.innerHTML = originalText;
  btn.disabled = false;
});
</script>
</body>
